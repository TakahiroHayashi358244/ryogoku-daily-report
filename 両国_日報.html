<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="両国日報">
  <title>両国 日報</title>
  <style>
    :root {
      --ink:    #1a1a2e;
      --mid:    #16213e;
      --accent: #0f3460;
      --gold:   #e94560;
      --pale:   #f5f0eb;
      --card:   #ffffff;
      --muted:  #8a8a9a;
      --radius: 16px;
      --check-on: #0f3460;
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    body {
      font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: var(--pale);
      min-height: 100vh;
      color: var(--ink);
    }

    /* ===== HEADER ===== */
    .header {
      background: var(--ink);
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      min-height: 64px;
    }
    .header-left {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .header-left h1 {
      color: #fff;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.05em;
      margin: 0;
      line-height: 1.2;
    }
    .header-left .sub {
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
      line-height: 1.2;
    }
    .status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #555;
      transition: background .3s;
    }
    .status-dot.connected { background: #4caf50; box-shadow: 0 0 6px #4caf50; }
    .status-dot.error     { background: var(--gold); }

    /* ===== TABS ===== */
    .tabs {
      display: flex;
      background: var(--ink);
      padding: 0 20px 12px;
      gap: 4px;
    }
    .tab-btn {
      flex: 1;
      padding: 9px 4px;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      background: transparent;
      cursor: pointer;
      transition: all .2s;
    }
    .tab-btn.active {
      background: var(--gold);
      color: #fff;
    }

    /* ===== CONTAINER ===== */
    .container { padding: 16px; max-width: 600px; margin: 0 auto; }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ===== CARD ===== */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,.07);
    }
    .card-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    /* ===== FORM ELEMENTS ===== */
    .form-row { margin-bottom: 14px; }
    .form-row label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 6px;
    }
    .form-row input[type="date"],
    .form-row input[type="number"],
    .form-row input[type="time"] {
      width: 100%;
      padding: 13px 14px;
      border: 1.5px solid #e0ddd8;
      border-radius: 12px;
      font-size: 17px;
      background: var(--pale);
      color: var(--ink);
      transition: border-color .2s;
      -webkit-appearance: none;
    }
    .form-row input:focus {
      outline: none;
      border-color: var(--accent);
      background: #fff;
    }
    input[type="number"] { text-align: right; }

    /* ===== STAFF CHECKLIST ===== */
    .staff-list { display: flex; flex-direction: column; gap: 10px; }

    .staff-item {
      border: 1.5px solid #e8e4de;
      border-radius: 14px;
      overflow: hidden;
      transition: border-color .2s;
    }
    .staff-item.checked { border-color: var(--check-on); }

    .staff-block {
      border-radius: 10px;
      transition: background .15s;
      padding: 4px 0;
    }
    .staff-block.drag-over {
      background: rgba(230, 180, 0, 0.12);
      border-radius: 10px;
    }
    .drag-handle {
      font-size: 20px;
      color: #ccc;
      cursor: grab;
      padding: 4px 6px;
      user-select: none;
      touch-action: none;
      flex-shrink: 0;
    }
    .drag-handle:active { cursor: grabbing; }
    .staff-row {
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 8px 0;
    }
    .staff-row input[type="text"] {
      flex: 1;
      padding: 10px 12px;
      border: 1.5px solid #e0ddd8;
      border-radius: 8px;
      font-size: 15px;
      background: var(--pale);
      min-width: 0;
    }
    .staff-row-detail {
      display: flex;
      gap: 12px;
      padding: 8px 0 4px;
      flex-wrap: wrap;
    }
    .staff-row-detail > div {
      flex: 1;
      min-width: 120px;
    }
    .staff-type-toggle {
      display: flex;
      border: 1.5px solid #e0ddd8;
      border-radius: 8px;
      overflow: hidden;
      font-size: 13px;
    }
    .staff-type-toggle button {
      flex: 1;
      padding: 7px 4px;
      border: none;
      background: var(--pale);
      color: var(--muted);
      cursor: pointer;
      font-size: 12px;
      transition: all .2s;
    }
    .staff-type-toggle button.active {
      background: var(--ink);
      color: #fff;
      font-weight: 700;
    }
    .staff-delete-btn {
      background: none;
      border: 1.5px solid #e0ddd8;
      border-radius: 8px;
      padding: 8px 10px;
      color: #cc4444;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
    }
    .staff-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      cursor: pointer;
      user-select: none;
      background: #fff;
    }
    .staff-checkbox {
      width: 22px; height: 22px;
      border: 2px solid #ccc;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all .2s;
      background: #fff;
    }
    .staff-item.checked .staff-checkbox {
      background: var(--check-on);
      border-color: var(--check-on);
    }
    .staff-checkbox svg { display: none; }
    .staff-item.checked .staff-checkbox svg { display: block; }

    .staff-name {
      font-size: 16px;
      font-weight: 600;
      flex: 1;
    }
    .staff-type {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 8px;
      background: #f0ede8;
      color: var(--muted);
      font-weight: 600;
    }
    .staff-item.checked .staff-type.hourly { background: #e8f0fe; color: var(--accent); }
    .staff-item.checked .staff-type.fixed  { background: #fce8ec; color: var(--gold); }

    /* 時刻入力（チェック時に展開） */
    .staff-times {
      display: none;
      padding: 0 16px 14px;
      gap: 12px;
      background: #fafafa;
      border-top: 1px solid #f0ede8;
    }
    .staff-item.checked .staff-times { display: flex; }

    .time-field { flex: 1; }
    .time-field label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 5px;
      letter-spacing: .05em;
    }
    .time-field input[type="time"] {
      width: 100%;
      padding: 10px 10px;
      border: 1.5px solid #e0ddd8;
      border-radius: 10px;
      font-size: 18px;
      font-weight: 600;
      background: #fff;
      text-align: center;
    }

    /* ===== PREVIEW ===== */
    .preview {
      background: var(--ink);
      border-radius: 14px;
      padding: 16px;
      display: none;
    }
    .preview.show { display: block; }
    .preview-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
      border-bottom: 1px solid rgba(255,255,255,.08);
      font-size: 14px;
    }
    .preview-row:last-child { border-bottom: none; }
    .preview-label { color: rgba(255,255,255,.5); }
    .preview-value { color: #fff; font-weight: 700; font-size: 16px; }

    /* ===== BUTTON ===== */
    .btn-submit {
      width: 100%;
      padding: 17px;
      border: none;
      border-radius: 14px;
      background: var(--gold);
      color: #fff;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: .05em;
      transition: opacity .2s, transform .15s;
      margin-top: 14px;
    }
    .btn-submit:active { transform: scale(0.98); opacity: .85; }
    .btn-submit:disabled { opacity: .4; cursor: not-allowed; }

    .btn-secondary {
      width: 100%;
      padding: 13px;
      border: 1.5px solid #e0ddd8;
      border-radius: 12px;
      background: #fff;
      color: var(--ink);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background .2s;
    }
    .btn-secondary:active { background: var(--pale); }

    /* ===== LIST ===== */
    .log-item {
      background: var(--card);
      border-radius: 14px;
      padding: 15px;
      margin-bottom: 10px;
      border-left: 4px solid var(--accent);
    }
    .log-item.synced { border-left-color: #4caf50; }
    .log-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .log-date { font-weight: 700; font-size: 15px; color: var(--accent); }
    .log-badge {
      font-size: 11px;
      padding: 3px 9px;
      border-radius: 8px;
      font-weight: 600;
    }
    .log-badge.synced { background: #e8f5e9; color: #2e7d32; }
    .log-badge.pending { background: #fff8e1; color: #f57f17; }
    .log-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      padding: 3px 0;
    }
    .log-key { color: var(--muted); }
    .log-val { font-weight: 600; }

    /* ===== SETTINGS ===== */
    .setting-label {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--ink);
      display: block;
    }
    .setting-help {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }
    .setting-group { margin-bottom: 20px; }
    input[type="text"].url-input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #e0ddd8;
      border-radius: 12px;
      font-size: 13px;
      background: var(--pale);
      color: var(--ink);
    }
    input[type="text"].url-input:focus {
      outline: none;
      border-color: var(--accent);
      background: #fff;
    }

    /* ===== EMPTY ===== */
    .empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; }
    .empty-icon { font-size: 40px; margin-bottom: 10px; }
  </style>
</head>

          <span class="preview-value" id="prev-count">-</span>
        </div>
        <div class="preview-row">
          <span class="preview-label">個数</span>
          <span class="preview-value" id="prev-units">-</span>
        </div>
      </div>
      <div id="preview-placeholder" style="color:var(--muted);font-size:13px;text-align:center;padding:10px 0;">
        出勤者を選択すると確認欄が表示されます
      </div>
      <button class="btn-submit" id="submitBtn" onclick="submitReport()">送信する</button>
    </div>

  </div>

  <!-- ========== 履歴タブ ========== -->
  <div id="list-tab" class="tab-content">
    <div id="logList"></div>
  </div>

  <!-- ========== 設定タブ ========== -->
  <div id="staff-tab" class="tab-content">
  <!-- パスワードゲート -->
  <div class="card" id="staff-password-gate">
    <div class="card-title">スタッフ管理</div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:12px;">
      スタッフ情報はスプレッドシートに直接反映されます
    </p>
    <div class="form-row">
      <label>パスワード</label>
      <input type="password" id="staffPassword" placeholder="パスワードを入力"
             style="width:100%;padding:13px 14px;border:1.5px solid #e0ddd8;border-radius:12px;font-size:17px;background:var(--pale);"
             onkeydown="if(event.key==='Enter')checkStaffPassword()">
    </div>
    <button class="btn-submit" onclick="checkStaffPassword()" style="margin-top:8px;">認証</button>
  </div>

  <!-- スタッフ管理コンテンツ -->
  <div id="staff-content" style="display:none;">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <div class="card-title" style="margin-bottom:0;">スタッフ一覧</div>
        <button onclick="addStaffRow()" style="background:var(--gold);color:var(--ink);border:none;border-radius:10px;padding:8px 16px;font-size:14px;font-weight:700;cursor:pointer;">＋ 追加</button>
      </div>
      <div id="staff-list-container">
        <div style="text-align:center;padding:20px;color:var(--muted);font-size:14px;">読込中...</div>
      </div>
      <div style="margin-top:16px;display:flex;flex-direction:column;gap:10px;">
        <button class="btn-submit" onclick="saveStaff()" style="width:100%;">スプレッドシートに保存</button>
        <button class="btn-secondary" onclick="loadStaff()" style="width:100%;">再読込</button>
      </div>
    </div>
  </div>
</div>

<div id="settings-tab" class="tab-content">
    <div class="card" id="password-gate" style="display:none;">
      <div class="card-title">パスワード認証</div>
      <div class="form-row">
        <label>パスワード</label>
        <input type="password" id="settingsPassword" placeholder="パスワードを入力" style="width:100%;padding:13px 14px;border:1.5px solid #e0ddd8;border-radius:12px;font-size:17px;background:var(--pale);">
      </div>
      <button class="btn-submit" onclick="checkPassword()" style="margin-top:8px;">認証</button>
    </div>

    <div class="card" id="settings-content" style="display:none;">
      <div class="card-title">GAS 接続設定</div>
      <div class="setting-group">
        <label class="setting-label">Apps Script URL</label>
        <input type="text" class="url-input" id="scriptUrl" placeholder="https://script.google.com/macros/s/.../exec">
        <div class="setting-help">GASウェブアプリのURLを貼り付けてください</div>
      </div>
      <button class="btn-submit" onclick="saveConfig()" style="margin-top:0;">保存</button>
      <button class="btn-secondary" onclick="testConnection()">接続テスト</button>

      <div class="card-title" style="margin-top:20px;">パスワード変更</div>
      <div class="setting-group">
        <label class="setting-label">新しいパスワード</label>
        <input type="password" id="newPassword" placeholder="新しいパスワード" style="width:100%;padding:13px 14px;border:1.5px solid #e0ddd8;border-radius:12px;font-size:17px;background:var(--pale);">
      </div>
      <button class="btn-secondary" onclick="changePassword()">パスワード変更</button>
    </div>
  </div>

</div><!-- /container -->

<script>
// ============================================================
// スタッフ定義（GASから動的取得）
// ============================================================
let STAFF = [];  // GASのスタッフシートから取得して設定

// ============================================================
// 状態
// ============================================================
let config = null;
let logs   = [];

// ============================================================
// 初期化
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  setTodayDate();
  loadConfig();
  loadLogs();
  renderLogs();
  // GASからスタッフ一覧を取得してフォームを構築
  fetchAndBuildStaff();
});

// GASからスタッフ一覧を取得（scriptタグ経由でCORS回避）
function fetchAndBuildStaff() {
  const container = document.getElementById('staffList');

  // キャッシュがあれば先に表示
  const cached = localStorage.getItem('ryogoku_staff_cache');
  if (cached) {
    try {
      STAFF = JSON.parse(cached);
      buildStaffList();
    } catch(e) {}
  } else {
    container.innerHTML = '<div style="color:var(--muted);font-size:13px;padding:10px 0;text-align:center;">読み込み中...</div>';
  }

  // GASが未設定なら終了
  if (!config?.scriptUrl) {
    if (STAFF.length === 0) {
      container.innerHTML = '<div style="color:var(--muted);font-size:13px;padding:10px 0;text-align:center;">設定タブでGAS URLを登録後、再読み込みしてください</div>';
    }
    return;
  }

  // scriptタグ経由でGASからJSONPを取得（CORS回避）
  window._gasStaffCallback = function(json) {
    try {
      if (json.success && json.data?.staff?.length) {
        STAFF = json.data.staff;
        localStorage.setItem('ryogoku_staff_cache', JSON.stringify(STAFF));
        buildStaffList();
        console.log('スタッフ一覧を更新:', STAFF.length + '名');
      }
    } catch(e) {
      console.warn('スタッフ取得コールバックエラー:', e);
    }
    // scriptタグを削除
    const old = document.getElementById('_gas_staff_script');
    if (old) old.remove();
  };

  const url = config.scriptUrl + '?action=getStaff&callback=_gasStaffCallback';
  const script = document.createElement('script');
  script.id  = '_gas_staff_script';
  script.src = url;
  script.onerror = () => {
    console.warn('スタッフ取得失敗');
    script.remove();
  };
  document.head.appendChild(script);
}

function setTodayDate() {
  document.getElementById('date').value = new Date().toISOString().split('T')[0];
}

// ============================================================
// スタッフリスト生成
// ============================================================
function buildStaffList() {
  const container = document.getElementById('staffList');
  container.innerHTML = STAFF.map((s, i) => `
    <div class="staff-item" id="staff-${i}">
      <div class="staff-header" onclick="toggleStaff(${i})">
        <div class="staff-checkbox">
          <svg width="13" height="10" viewBox="0 0 13 10" fill="none">
            <path d="M1 5l3.5 3.5L12 1" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="staff-name">${s.name}</span>
        <span class="staff-type ${s.type}">${s.type === 'fixed' ? '月額固定' : '時給'}</span>
      </div>
      <div class="staff-times">
        <div class="time-field">
          <label>開始時刻</label>
          <input type="time" id="start-${i}" value="09:00" oninput="updatePreview()">
        </div>
        <div class="time-field">
          <label>終了時刻</label>
          <input type="time" id="end-${i}" value="18:00" oninput="updatePreview()">
        </div>
      </div>
    </div>
  `).join('');
}

function toggleStaff(i) {
  const el = document.getElementById(`staff-${i}`);
  el.classList.toggle('checked');
  updatePreview();
}

// ============================================================
// プレビュー更新
// ============================================================
function updatePreview() {
  const checked = getCheckedStaff();
  const units   = parseInt(document.getElementById('unitCount').value) || 0;
  const preview = document.getElementById('preview');
  const ph      = document.getElementById('preview-placeholder');

  if (checked.length === 0) {
    preview.classList.remove('show');
    ph.style.display = 'block';
    return;
  }

  preview.classList.add('show');
  ph.style.display = 'none';
  document.getElementById('prev-count').textContent = checked.length + '名';
  document.getElementById('prev-units').textContent = units.toLocaleString() + ' 個';
}

function getCheckedStaff() {
  return STAFF.map((s, i) => {
    const el = document.getElementById(`staff-${i}`);
    if (!el.classList.contains('checked')) return null;
    const startEl = document.getElementById(`start-${i}`);
    const endEl   = document.getElementById(`end-${i}`);
    return {
      name:      s.name,
      startTime: startEl ? startEl.value : '',
      endTime:   endEl   ? endEl.value   : ''
    };
  }).filter(Boolean);
}

// ============================================================
// 送信
// ============================================================
async function submitReport() {
  const date      = document.getElementById('date').value;
  const unitCount = parseInt(document.getElementById('unitCount').value) || 0;
  const staff     = getCheckedStaff();

  if (!date)          { alert('日付を入力してください'); return; }
  if (unitCount <= 0) { alert('個数を入力してください'); return; }
  if (staff.length === 0) { alert('出勤者を選択してください'); return; }

  // 時刻未入力チェック（全スタッフ）
  for (const s of staff) {
    if (!s.startTime || !s.endTime) {
      alert(`${s.name} の時刻を入力してください`);
      return;
    }
  }

  const payload = { date, unitCount, staff };

  // ローカル保存
  const record = { ...payload, synced: false, timestamp: new Date().toISOString() };
  logs.unshift(record);
  saveLogs();

  if (!config || !config.scriptUrl) {
    alert('💾 保存しました（オフライン）\n設定タブでGAS URLを登録してください');
    resetForm();
    return;
  }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '送信中...';

  try {
    await sendToGAS(payload);
    record.synced = true;
    saveLogs();
    renderLogs();
    alert('✅ 送信完了しました');
    resetForm();
  } catch (err) {
    console.error(err);
    alert('⚠️ 送信に失敗しました\nデータは保存されています');
  } finally {
    btn.disabled = false;
    btn.textContent = '送信する';
  }
}

async function sendToGAS(data) {
  const params = new URLSearchParams();
  params.append('action', 'addData');
  params.append('data', JSON.stringify(data));
  const url = config.scriptUrl + '?' + params.toString();

  // fetchのみで送信（iframeとの二重送信を廃止）
  try {
    const res = await fetch(url, {
      method: 'GET',
      mode: 'no-cors',
      cache: 'no-cache'
    });
    return;
  } catch(err) {
    // no-corsでも例外が出る場合はscriptタグで送信
    return new Promise((resolve) => {
      const script = document.createElement('script');
      script.src = url + '&_t=' + Date.now();
      script.onload = () => { script.remove(); resolve(); };
      script.onerror = () => { script.remove(); resolve(); };
      document.head.appendChild(script);
      setTimeout(resolve, 8000);
    });
  }
}

function resetForm() {
  setTodayDate();
  document.getElementById('unitCount').value = '';
  document.querySelectorAll('.staff-item').forEach(el => el.classList.remove('checked'));
  document.getElementById('preview').classList.remove('show');
  document.getElementById('preview-placeholder').style.display = 'block';
}

// ============================================================
// 履歴
// ============================================================
function renderLogs() {
  const container = document.getElementById('logList');
  if (logs.length === 0) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">📭</div>送信履歴がありません</div>`;
    return;
  }
  container.innerHTML = logs.map((r, idx) => {
    const names = r.staff.map(s => s.name).join('、');
    return `
      <div class="log-item ${r.synced ? 'synced' : ''}" id="log-item-${idx}">
        <div class="log-header">
          <span class="log-date">${r.date}</span>
          <div style="display:flex;align-items:center;gap:8px;">
            <span class="log-badge ${r.synced ? 'synced' : 'pending'}">${r.synced ? '✓ 送信済' : '⏳ 未送信'}</span>
            <button onclick="deleteLog(${idx})" style="background:none;border:1px solid #e0ddd8;border-radius:6px;padding:3px 8px;font-size:11px;color:var(--muted);cursor:pointer;">削除</button>
          </div>
        </div>
        <div class="log-row"><span class="log-key">個数</span><span class="log-val">${r.unitCount.toLocaleString()} 個</span></div>
        <div class="log-row"><span class="log-key">出勤者</span><span class="log-val">${names}</span></div>
      </div>`;
  }).join('');
}

// ============================================================
// 設定
// ============================================================
function saveConfig() {
  const url = document.getElementById('scriptUrl').value.trim();
  if (!url) { alert('URLを入力してください'); return; }
  config = { scriptUrl: url };
  localStorage.setItem('ryogoku_config', JSON.stringify(config));
  updateStatusUI();
  alert('✅ 保存しました');
  // 保存後にスタッフ一覧を再取得
  fetchAndBuildStaff();
}

function loadConfig() {
  const s = localStorage.getItem('ryogoku_config');
  if (s) {
    config = JSON.parse(s);
    document.getElementById('scriptUrl').value = config.scriptUrl;
  }
  updateStatusUI();
}

async function testConnection() {
  if (!config?.scriptUrl) { alert('URLを設定してください'); return; }

  const btn = document.querySelector('.btn-secondary');
  if (btn) { btn.textContent = 'テスト中...'; btn.disabled = true; }

  try {
    const res = await fetch(config.scriptUrl, {
      method: 'GET',
      mode: 'cors',
      cache: 'no-cache'
    });
    const json = await res.json();
    if (json.success) {
      updateStatusUI(true);
      alert('✅ 接続成功！\nGASと正常に通信できています。');
    } else {
      alert('⚠️ GASから応答がありましたが異常です。\n' + json.message);
    }
  } catch (err) {
    // CORSエラーはno-corsで再試行（成功とみなす）
    try {
      await fetch(config.scriptUrl, { method: 'GET', mode: 'no-cors', cache: 'no-cache' });
      updateStatusUI(true);
      alert('✅ 接続テスト完了！\nGASに接続できています。');
    } catch (err2) {
      alert('❌ 接続に失敗しました。\nURLを確認してください。\n\n' + err2.message);
    }
  } finally {
    if (btn) { btn.textContent = '接続テスト'; btn.disabled = false; }
  }
}

function updateStatusUI(forceOk) {
  const dot  = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  if (forceOk || config?.scriptUrl) {
    dot.className  = 'status-dot connected';
    text.textContent = '連携中';
  } else {
    dot.className  = 'status-dot';
    text.textContent = '未設定';
  }
}

// ============================================================
// ローカルストレージ
// ============================================================
function saveLogs() { localStorage.setItem('ryogoku_logs', JSON.stringify(logs)); }

function deleteLog(idx) {
  if (!confirm(`${logs[idx].date} のデータを削除しますか？`)) return;
  logs.splice(idx, 1);
  saveLogs();
  renderLogs();
}
function loadLogs()  {
  const s = localStorage.getItem('ryogoku_logs');
  if (s) logs = JSON.parse(s);
}

// ============================================================
// タブ切り替え
// ============================================================
// タブ切り替えのたびに認証状態をリセット
let settingsAuthenticated = false;
let staffAuthenticated    = false;

function switchTab(name, btn) {
  // 設定・スタッフタブから離れたら認証リセット
  if (name !== 'settings') {
    settingsAuthenticated = false;
    sessionStorage.removeItem('settings_auth');
  }
  if (name !== 'staff') {
    staffAuthenticated = false;
    sessionStorage.removeItem('staff_auth');
  }

  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(name + '-tab').classList.add('active');
  btn.classList.add('active');
  if (name === 'list')     renderLogs();
  if (name === 'settings') initSettingsTab();
  if (name === 'staff')    initStaffTab();
}

// パスワード機能
const DEFAULT_PASSWORD = '1124';

function getPassword() {
  return localStorage.getItem('ryogoku_password') || DEFAULT_PASSWORD;
}

function initSettingsTab() {
  document.getElementById('password-gate').style.display    = settingsAuthenticated ? 'none'  : 'block';
  document.getElementById('settings-content').style.display = settingsAuthenticated ? 'block' : 'none';
  if (!settingsAuthenticated) {
    document.getElementById('settingsPassword').value = '';
    setTimeout(() => document.getElementById('settingsPassword').focus(), 100);
  }
}

function checkPassword() {
  const input = document.getElementById('settingsPassword').value;
  if (input === getPassword()) {
    settingsAuthenticated = true;
    document.getElementById('password-gate').style.display    = 'none';
    document.getElementById('settings-content').style.display = 'block';
  } else {
    alert('パスワードが違います');
    document.getElementById('settingsPassword').value = '';
  }
}

function changePassword() {
  const newPw = document.getElementById('newPassword').value.trim();
  if (!newPw) { alert('パスワードを入力してください'); return; }
  if (newPw.length < 4) { alert('4文字以上で設定してください'); return; }
  localStorage.setItem('ryogoku_password', newPw);
  document.getElementById('newPassword').value = '';
  alert('✅ パスワードを変更しました');
}

// ============================================================
// スタッフ管理
// ============================================================

let staffData = []; // 現在の編集中スタッフデータ

function initStaffTab() {
  document.getElementById('staff-password-gate').style.display = staffAuthenticated ? 'none'  : 'block';
  document.getElementById('staff-content').style.display       = staffAuthenticated ? 'block' : 'none';
  if (!staffAuthenticated) {
    document.getElementById('staffPassword').value = '';
    setTimeout(() => document.getElementById('staffPassword').focus(), 100);
  }
  if (staffAuthenticated && staffData.length === 0) loadStaff();
}

function checkStaffPassword() {
  const input = document.getElementById('staffPassword').value;
  if (input === getPassword()) {
    staffAuthenticated = true;
    document.getElementById('staff-password-gate').style.display = 'none';
    document.getElementById('staff-content').style.display       = 'block';
    loadStaff();
  } else {
    alert('パスワードが違います');
    document.getElementById('staffPassword').value = '';
  }
}

function loadStaff() {
  const url = document.getElementById('scriptUrl').value.trim();
  if (!url) { alert('設定タブでGAS URLを設定してください'); return; }

  document.getElementById('staff-list-container').innerHTML =
    '<div style="text-align:center;padding:20px;color:var(--muted);font-size:14px;">読込中...</div>';

  const cbName = '_staffDetailCb_' + Date.now();
  const script = document.createElement('script');
  script.src = `${url}?action=getStaffDetail&callback=${cbName}`;

  window[cbName] = function(res) {
    document.head.removeChild(script);
    delete window[cbName];
    if (res.success && res.data?.staff) {
      staffData = res.data.staff.map(s => ({...s}));
      renderStaffList();
    } else {
      document.getElementById('staff-list-container').innerHTML =
        '<div style="color:red;padding:12px;">読込失敗</div>';
    }
  };

  script.onerror = () => {
    document.getElementById('staff-list-container').innerHTML =
      '<div style="color:red;padding:12px;">接続エラー</div>';
    delete window[cbName];
  };
  document.head.appendChild(script);
}

function renderStaffList() {
  const container = document.getElementById('staff-list-container');
  if (staffData.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:20px;color:var(--muted);">スタッフなし</div>';
    return;
  }

  container.innerHTML = staffData.map((s, i) => `
    <div class="staff-block" data-index="${i}" draggable="true">
      <div class="staff-row">
        <div class="drag-handle" title="ドラッグして並べ替え">⠿</div>
        <input type="text"
               data-field="name" data-idx="${i}"
               value="${s.name.replace(/"/g, '&quot;')}" placeholder="氏名"
               class="staff-input">
        <button class="staff-delete-btn" onclick="deleteStaffRow(${i})">✕</button>
      </div>
      <div class="staff-row-detail">
        <div>
          <div style="font-size:11px;color:var(--muted);margin-bottom:4px;">種別</div>
          <div class="staff-type-toggle">
            <button onclick="setStaffType(${i}, false)"
                    class="${!s.isFixed ? 'active' : ''}">時給</button>
            <button onclick="setStaffType(${i}, true)"
                    class="${s.isFixed ? 'active' : ''}">月額固定</button>
          </div>
        </div>
        <div>
          ${s.isFixed
            ? `<div style="font-size:11px;color:var(--muted);margin-bottom:4px;">月額固定金額（円）</div>
               <input type="number"
                      data-field="fixedAmount" data-idx="${i}"
                      value="${s.fixedAmount}" min="0" step="1000"
                      class="staff-input"
                      style="width:100%;padding:8px 10px;border:1.5px solid #e0ddd8;border-radius:8px;font-size:14px;background:var(--pale);">`
            : `<div style="font-size:11px;color:var(--muted);margin-bottom:4px;">時給（円）</div>
               <input type="number"
                      data-field="hourlyRate" data-idx="${i}"
                      value="${s.hourlyRate}" min="0" step="50"
                      class="staff-input"
                      style="width:100%;padding:8px 10px;border:1.5px solid #e0ddd8;border-radius:8px;font-size:14px;background:var(--pale);">`
          }
        </div>
      </div>
    </div>
    <hr style="border:none;border-top:1.5px solid #f0ede8;margin:2px 0;">
  `).join('');

  // oninputをまとめてイベント委任（インデックスではなくdata-idx属性で特定）
  container.oninput = function(e) {
    const input = e.target.closest('.staff-input');
    if (!input) return;
    const idx   = Number(input.dataset.idx);
    const field = input.dataset.field;
    if (isNaN(idx) || !field) return;
    staffData[idx][field] = input.type === 'number' ? Number(input.value) : input.value;
  };

  initDragAndDrop();
}

// ドラッグ＆ドロップ（PC・スマホ両対応）
let dragSrcIndex = null;
let touchDragEl  = null;
let touchClone   = null;

// 並べ替え前に現在の入力値をstaffDataに保存
function syncInputsToStaffData() {
  document.querySelectorAll('.staff-input').forEach(input => {
    const idx   = Number(input.dataset.idx);
    const field = input.dataset.field;
    if (isNaN(idx) || !field || !staffData[idx]) return;
    staffData[idx][field] = input.type === 'number' ? Number(input.value) : input.value;
  });
}

function initDragAndDrop() {
  const blocks = document.querySelectorAll('.staff-block');

  blocks.forEach(block => {
    const handle = block.querySelector('.drag-handle');

    // --- PC: HTML5 drag ---
    block.addEventListener('dragstart', e => {
      dragSrcIndex = Number(block.dataset.index);
      block.style.opacity = '0.4';
      e.dataTransfer.effectAllowed = 'move';
    });
    block.addEventListener('dragend', () => {
      block.style.opacity = '';
      document.querySelectorAll('.staff-block').forEach(b => b.classList.remove('drag-over'));
    });
    block.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      document.querySelectorAll('.staff-block').forEach(b => b.classList.remove('drag-over'));
      block.classList.add('drag-over');
    });
    block.addEventListener('drop', e => {
      e.preventDefault();
      const targetIndex = Number(block.dataset.index);
      if (dragSrcIndex !== null && dragSrcIndex !== targetIndex) {
        syncInputsToStaffData(); // 並べ替え前に入力値を保存
        const moved = staffData.splice(dragSrcIndex, 1)[0];
        staffData.splice(targetIndex, 0, moved);
        renderStaffList();
      }
    });

    // --- スマホ: Touch drag（ハンドル限定）---
    handle.addEventListener('touchstart', e => {
      dragSrcIndex = Number(block.dataset.index);
      touchDragEl  = block;

      // クローンを作成してドラッグ表示
      touchClone = block.cloneNode(true);
      const rect = block.getBoundingClientRect();
      touchClone.style.cssText = `
        position:fixed; left:${rect.left}px; top:${rect.top}px;
        width:${rect.width}px; opacity:0.85; z-index:9999;
        background:var(--surface); border-radius:12px;
        box-shadow:0 8px 24px rgba(0,0,0,0.18); pointer-events:none;
        transition:none;
      `;
      document.body.appendChild(touchClone);
      block.style.opacity = '0.3';
    }, { passive: true });

    handle.addEventListener('touchmove', e => {
      if (!touchClone) return;
      e.preventDefault();
      const touch = e.touches[0];
      const rect  = touchDragEl.getBoundingClientRect();
      touchClone.style.top  = `${touch.clientY - rect.height / 2}px`;
      touchClone.style.left = `${rect.left}px`;

      // ホバー先を判定
      touchClone.style.display = 'none';
      const el = document.elementFromPoint(touch.clientX, touch.clientY);
      touchClone.style.display = '';
      const targetBlock = el?.closest('.staff-block');
      document.querySelectorAll('.staff-block').forEach(b => b.classList.remove('drag-over'));
      if (targetBlock && targetBlock !== touchDragEl) targetBlock.classList.add('drag-over');
    }, { passive: false });

    handle.addEventListener('touchend', e => {
      if (!touchClone) return;
      const touch = e.changedTouches[0];
      touchClone.remove();
      touchClone = null;
      if (touchDragEl) touchDragEl.style.opacity = '';

      touchClone = null;
      const el = document.elementFromPoint(touch.clientX, touch.clientY);
      const targetBlock = el?.closest('.staff-block');
      document.querySelectorAll('.staff-block').forEach(b => b.classList.remove('drag-over'));

      if (targetBlock) {
        const targetIndex = Number(targetBlock.dataset.index);
        if (dragSrcIndex !== null && dragSrcIndex !== targetIndex) {
          syncInputsToStaffData(); // 並べ替え前に入力値を保存
          const moved = staffData.splice(dragSrcIndex, 1)[0];
          staffData.splice(targetIndex, 0, moved);
          renderStaffList();
        }
      }
      dragSrcIndex = null;
      touchDragEl  = null;
    }, { passive: true });
  });
}

function setStaffType(idx, isFixed) {
  staffData[idx].isFixed = isFixed;
  renderStaffList();
}

function deleteStaffRow(idx) {
  if (!confirm(`「${staffData[idx].name}」を削除しますか？`)) return;
  staffData.splice(idx, 1);
  renderStaffList();
}

function addStaffRow() {
  staffData.push({ name: '', hourlyRate: 1300, isFixed: false, fixedAmount: 0 });
  renderStaffList();
  // 最下段の入力欄にフォーカス＆スクロール
  setTimeout(() => {
    const inputs = document.querySelectorAll('#staff-list-container input[type="text"]');
    if (inputs.length > 0) {
      const last = inputs[inputs.length - 1];
      last.focus();
      last.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }, 100);
}

async function saveStaff() {
  const url = document.getElementById('scriptUrl').value.trim();
  if (!url) { alert('設定タブでGAS URLを設定してください'); return; }

  // バリデーション
  const invalid = staffData.find(s => !s.name.trim());
  if (invalid) { alert('氏名が空のスタッフがいます'); return; }

  const btn = document.querySelector('#staff-content .btn-submit');
  btn.textContent = '保存中...';
  btn.disabled = true;

  try {
    const payload = JSON.stringify({
      action: 'updateStaff',
      staff: staffData.map(s => ({
        name:        s.name.trim(),
        hourlyRate:  s.hourlyRate  || 0,
        isFixed:     s.isFixed     || false,
        fixedAmount: s.fixedAmount || 0
      }))
    });

    const res = await fetch(`${url}?action=updateStaff&data=${encodeURIComponent(payload)}`);
    const json = await res.json();

    if (json.success) {
      alert(`✅ ${json.message}`);
      // 入力フォームのスタッフ一覧も更新
      STAFF = null;
      loadStaffList();
    } else {
      alert('保存失敗: ' + json.message);
    }
  } catch(e) {
    // CORS回避でGETフォールバック
    try {
      const cbName = '_saveStaffCb_' + Date.now();
      const script = document.createElement('script');
      const payload = encodeURIComponent(JSON.stringify({
        staff: staffData.map(s => ({
          name:        s.name.trim(),
          hourlyRate:  s.hourlyRate  || 0,
          isFixed:     s.isFixed     || false,
          fixedAmount: s.fixedAmount || 0
        }))
      }));
      script.src = `${url}?action=updateStaff&data=${payload}&callback=${cbName}`;

      await new Promise((resolve, reject) => {
        window[cbName] = function(res) {
          document.head.removeChild(script);
          delete window[cbName];
          if (res.success) {
            alert('✅ ' + res.message);
            STAFF = null;
            loadStaffList();
            resolve();
          } else {
            alert('保存失敗: ' + res.message);
            reject(new Error(res.message));
          }
        };
        script.onerror = () => { delete window[cbName]; reject(new Error('接続エラー')); };
        document.head.appendChild(script);
      });
    } catch(e2) {
      alert('保存エラー: ' + e2.message);
    }
  } finally {
    btn.textContent = 'スプレッドシートに保存';
    btn.disabled = false;
  }
}
</script>
