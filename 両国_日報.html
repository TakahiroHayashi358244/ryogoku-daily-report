<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="両国日報">
  <title>両国 日報</title>
  <style>
    :root {
      --ink:    #1a1a2e;
      --mid:    #16213e;
      --accent: #0f3460;
      --gold:   #e94560;
      --pale:   #f5f0eb;
      --card:   #ffffff;
      --muted:  #8a8a9a;
      --radius: 16px;
      --check-on: #0f3460;
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    body {
      font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: var(--pale);
      min-height: 100vh;
      color: var(--ink);
    }

    /* ===== HEADER ===== */
    .header {
      background: var(--ink);
      padding: 20px 20px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-left h1 {
      color: #fff;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.05em;
    }
    .header-left .sub {
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
    }
    .status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #555;
      transition: background .3s;
    }
    .status-dot.connected { background: #4caf50; box-shadow: 0 0 6px #4caf50; }
    .status-dot.error     { background: var(--gold); }

    /* ===== TABS ===== */
    .tabs {
      display: flex;
      background: var(--ink);
      padding: 0 20px 12px;
      gap: 4px;
    }
    .tab-btn {
      flex: 1;
      padding: 9px 4px;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      background: transparent;
      cursor: pointer;
      transition: all .2s;
    }
    .tab-btn.active {
      background: var(--gold);
      color: #fff;
    }

    /* ===== CONTAINER ===== */
    .container { padding: 16px; max-width: 600px; margin: 0 auto; }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ===== CARD ===== */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,.07);
    }
    .card-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    /* ===== FORM ELEMENTS ===== */
    .form-row { margin-bottom: 14px; }
    .form-row label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 6px;
    }
    .form-row input[type="date"],
    .form-row input[type="number"],
    .form-row input[type="time"] {
      width: 100%;
      padding: 13px 14px;
      border: 1.5px solid #e0ddd8;
      border-radius: 12px;
      font-size: 17px;
      background: var(--pale);
      color: var(--ink);
      transition: border-color .2s;
      -webkit-appearance: none;
    }
    .form-row input:focus {
      outline: none;
      border-color: var(--accent);
      background: #fff;
    }
    input[type="number"] { text-align: right; }

    /* ===== STAFF CHECKLIST ===== */
    .staff-list { display: flex; flex-direction: column; gap: 10px; }

    .staff-item {
      border: 1.5px solid #e8e4de;
      border-radius: 14px;
      overflow: hidden;
      transition: border-color .2s;
    }
    .staff-item.checked { border-color: var(--check-on); }

    .staff-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      cursor: pointer;
      user-select: none;
      background: #fff;
    }
    .staff-checkbox {
      width: 22px; height: 22px;
      border: 2px solid #ccc;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all .2s;
      background: #fff;
    }
    .staff-item.checked .staff-checkbox {
      background: var(--check-on);
      border-color: var(--check-on);
    }
    .staff-checkbox svg { display: none; }
    .staff-item.checked .staff-checkbox svg { display: block; }

    .staff-name {
      font-size: 16px;
      font-weight: 600;
      flex: 1;
    }
    .staff-type {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 8px;
      background: #f0ede8;
      color: var(--muted);
      font-weight: 600;
    }
    .staff-item.checked .staff-type.hourly { background: #e8f0fe; color: var(--accent); }
    .staff-item.checked .staff-type.fixed  { background: #fce8ec; color: var(--gold); }

    /* 時刻入力（チェック時に展開） */
    .staff-times {
      display: none;
      padding: 0 16px 14px;
      gap: 12px;
      background: #fafafa;
      border-top: 1px solid #f0ede8;
    }
    .staff-item.checked .staff-times { display: flex; }

    .time-field { flex: 1; }
    .time-field label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 5px;
      letter-spacing: .05em;
    }
    .time-field input[type="time"] {
      width: 100%;
      padding: 10px 10px;
      border: 1.5px solid #e0ddd8;
      border-radius: 10px;
      font-size: 18px;
      font-weight: 600;
      background: #fff;
      text-align: center;
    }

    /* ===== PREVIEW ===== */
    .preview {
      background: var(--ink);
      border-radius: 14px;
      padding: 16px;
      display: none;
    }
    .preview.show { display: block; }
    .preview-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
      border-bottom: 1px solid rgba(255,255,255,.08);
      font-size: 14px;
    }
    .preview-row:last-child { border-bottom: none; }
    .preview-label { color: rgba(255,255,255,.5); }
    .preview-value { color: #fff; font-weight: 700; font-size: 16px; }

    /* ===== BUTTON ===== */
    .btn-submit {
      width: 100%;
      padding: 17px;
      border: none;
      border-radius: 14px;
      background: var(--gold);
      color: #fff;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: .05em;
      transition: opacity .2s, transform .15s;
      margin-top: 14px;
    }
    .btn-submit:active { transform: scale(0.98); opacity: .85; }
    .btn-submit:disabled { opacity: .4; cursor: not-allowed; }

    .btn-secondary {
      width: 100%;
      padding: 13px;
      border: 1.5px solid #e0ddd8;
      border-radius: 12px;
      background: #fff;
      color: var(--ink);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background .2s;
    }
    .btn-secondary:active { background: var(--pale); }

    /* ===== LIST ===== */
    .log-item {
      background: var(--card);
      border-radius: 14px;
      padding: 15px;
      margin-bottom: 10px;
      border-left: 4px solid var(--accent);
    }
    .log-item.synced { border-left-color: #4caf50; }
    .log-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .log-date { font-weight: 700; font-size: 15px; color: var(--accent); }
    .log-badge {
      font-size: 11px;
      padding: 3px 9px;
      border-radius: 8px;
      font-weight: 600;
    }
    .log-badge.synced { background: #e8f5e9; color: #2e7d32; }
    .log-badge.pending { background: #fff8e1; color: #f57f17; }
    .log-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      padding: 3px 0;
    }
    .log-key { color: var(--muted); }
    .log-val { font-weight: 600; }

    /* ===== SETTINGS ===== */
    .setting-label {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--ink);
      display: block;
    }
    .setting-help {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }
    .setting-group { margin-bottom: 20px; }
    input[type="text"].url-input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #e0ddd8;
      border-radius: 12px;
      font-size: 13px;
      background: var(--pale);
      color: var(--ink);
    }
    input[type="text"].url-input:focus {
      outline: none;
      border-color: var(--accent);
      background: #fff;
    }

    /* ===== EMPTY ===== */
    .empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; }
    .empty-icon { font-size: 40px; margin-bottom: 10px; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>両国 日報</h1>
    <div class="sub" id="statusText">未設定</div>
  </div>
  <div class="status-dot" id="statusDot"></div>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('input', this)">入力</button>
  <button class="tab-btn" onclick="switchTab('list', this)">履歴</button>
  <button class="tab-btn" onclick="switchTab('settings', this)">設定</button>
</div>

<div class="container">

  <!-- ========== 入力タブ ========== -->
  <div id="input-tab" class="tab-content active">

    <div class="card">
      <div class="card-title">基本情報</div>
      <div class="form-row">
        <label>日付</label>
        <input type="date" id="date" required>
      </div>
      <div class="form-row">
        <label>作業個数</label>
        <input type="number" id="unitCount" placeholder="0" min="0" step="1" oninput="updatePreview()">
      </div>
    </div>

    <div class="card">
      <div class="card-title">出勤者・時刻</div>
      <div class="staff-list" id="staffList">
        <!-- JS で生成 -->
      </div>
    </div>

    <div class="card">
      <div class="card-title">送信前確認</div>
      <div class="preview" id="preview">
        <div class="preview-row">
          <span class="preview-label">出勤者数</span>
          <span class="preview-value" id="prev-count">-</span>
        </div>
        <div class="preview-row">
          <span class="preview-label">個数</span>
          <span class="preview-value" id="prev-units">-</span>
        </div>
      </div>
      <div id="preview-placeholder" style="color:var(--muted);font-size:13px;text-align:center;padding:10px 0;">
        出勤者を選択すると確認欄が表示されます
      </div>
      <button class="btn-submit" id="submitBtn" onclick="submitReport()">送信する</button>
    </div>

  </div>

  <!-- ========== 履歴タブ ========== -->
  <div id="list-tab" class="tab-content">
    <div id="logList"></div>
  </div>

  <!-- ========== 設定タブ ========== -->
  <div id="settings-tab" class="tab-content">
    <div class="card">
      <div class="card-title">GAS 接続設定</div>
      <div class="setting-group">
        <label class="setting-label">Apps Script URL</label>
        <input type="text" class="url-input" id="scriptUrl" placeholder="https://script.google.com/macros/s/.../exec">
        <div class="setting-help">GASウェブアプリのURLを貼り付けてください</div>
      </div>
      <button class="btn-submit" onclick="saveConfig()" style="margin-top:0;">保存</button>
      <button class="btn-secondary" onclick="testConnection()">接続テスト</button>
    </div>
  </div>

</div><!-- /container -->

<script>
// ============================================================
// スタッフ定義（マスタ）
// ============================================================
const STAFF = [
  { name: '神谷言美',   type: 'fixed'  },
  { name: '今井美菜代', type: 'hourly' },
  { name: '大野',       type: 'hourly' },
  { name: '渡辺',       type: 'hourly' },
  { name: '柳原',       type: 'hourly' },
];

// ============================================================
// 状態
// ============================================================
let config = null;
let logs   = [];

// ============================================================
// 初期化
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  setTodayDate();
  buildStaffList();
  loadConfig();
  loadLogs();
  renderLogs();
});

function setTodayDate() {
  document.getElementById('date').value = new Date().toISOString().split('T')[0];
}

// ============================================================
// スタッフリスト生成
// ============================================================
function buildStaffList() {
  const container = document.getElementById('staffList');
  container.innerHTML = STAFF.map((s, i) => `
    <div class="staff-item" id="staff-${i}">
      <div class="staff-header" onclick="toggleStaff(${i})">
        <div class="staff-checkbox">
          <svg width="13" height="10" viewBox="0 0 13 10" fill="none">
            <path d="M1 5l3.5 3.5L12 1" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="staff-name">${s.name}</span>
        <span class="staff-type ${s.type}">${s.type === 'fixed' ? '月額固定' : '時給'}</span>
      </div>
      ${s.type === 'hourly' ? `
      <div class="staff-times">
        <div class="time-field">
          <label>開始時刻</label>
          <input type="time" id="start-${i}" value="20:00" oninput="updatePreview()">
        </div>
        <div class="time-field">
          <label>終了時刻</label>
          <input type="time" id="end-${i}" value="05:00" oninput="updatePreview()">
        </div>
      </div>` : ''}
    </div>
  `).join('');
}

function toggleStaff(i) {
  const el = document.getElementById(`staff-${i}`);
  el.classList.toggle('checked');
  updatePreview();
}

// ============================================================
// プレビュー更新
// ============================================================
function updatePreview() {
  const checked = getCheckedStaff();
  const units   = parseInt(document.getElementById('unitCount').value) || 0;
  const preview = document.getElementById('preview');
  const ph      = document.getElementById('preview-placeholder');

  if (checked.length === 0) {
    preview.classList.remove('show');
    ph.style.display = 'block';
    return;
  }

  preview.classList.add('show');
  ph.style.display = 'none';
  document.getElementById('prev-count').textContent = checked.length + '名';
  document.getElementById('prev-units').textContent = units.toLocaleString() + ' 個';
}

function getCheckedStaff() {
  return STAFF.map((s, i) => {
    const el = document.getElementById(`staff-${i}`);
    if (!el.classList.contains('checked')) return null;
    const startEl = document.getElementById(`start-${i}`);
    const endEl   = document.getElementById(`end-${i}`);
    return {
      name:      s.name,
      startTime: startEl ? startEl.value : '',
      endTime:   endEl   ? endEl.value   : ''
    };
  }).filter(Boolean);
}

// ============================================================
// 送信
// ============================================================
async function submitReport() {
  const date      = document.getElementById('date').value;
  const unitCount = parseInt(document.getElementById('unitCount').value) || 0;
  const staff     = getCheckedStaff();

  if (!date)          { alert('日付を入力してください'); return; }
  if (unitCount <= 0) { alert('個数を入力してください'); return; }
  if (staff.length === 0) { alert('出勤者を選択してください'); return; }

  // 時刻未入力チェック（時給スタッフのみ）
  for (const s of staff) {
    const master = STAFF.find(m => m.name === s.name);
    if (master.type === 'hourly' && (!s.startTime || !s.endTime)) {
      alert(`${s.name} の時刻を入力してください`);
      return;
    }
  }

  const payload = { date, unitCount, staff };

  // ローカル保存
  const record = { ...payload, synced: false, timestamp: new Date().toISOString() };
  logs.unshift(record);
  saveLogs();

  if (!config || !config.scriptUrl) {
    alert('💾 保存しました（オフライン）\n設定タブでGAS URLを登録してください');
    resetForm();
    return;
  }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '送信中...';

  try {
    await sendToGAS(payload);
    record.synced = true;
    saveLogs();
    renderLogs();
    alert('✅ 送信完了しました');
    resetForm();
  } catch (err) {
    console.error(err);
    alert('⚠️ 送信に失敗しました\nデータは保存されています');
  } finally {
    btn.disabled = false;
    btn.textContent = '送信する';
  }
}

async function sendToGAS(data) {
  return new Promise((resolve, reject) => {
    const params = new URLSearchParams();
    params.append('action', 'addData');
    params.append('data', JSON.stringify(data));
    const url = config.scriptUrl + '?' + params.toString();

    // iframe + fetch 二重送信（iOS対応）
    const iframe = document.createElement('iframe');
    iframe.style.cssText = 'display:none;width:0;height:0;';
    iframe.src = url;
    document.body.appendChild(iframe);

    fetch(url, { method: 'GET', mode: 'no-cors', cache: 'no-cache' })
      .catch(() => {});

    setTimeout(() => {
      iframe.parentNode && document.body.removeChild(iframe);
      resolve();
    }, 7000);
  });
}

function resetForm() {
  setTodayDate();
  document.getElementById('unitCount').value = '';
  document.querySelectorAll('.staff-item').forEach(el => el.classList.remove('checked'));
  document.getElementById('preview').classList.remove('show');
  document.getElementById('preview-placeholder').style.display = 'block';
}

// ============================================================
// 履歴
// ============================================================
function renderLogs() {
  const container = document.getElementById('logList');
  if (logs.length === 0) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">📭</div>送信履歴がありません</div>`;
    return;
  }
  container.innerHTML = logs.map(r => {
    const names = r.staff.map(s => s.name).join('、');
    return `
      <div class="log-item ${r.synced ? 'synced' : ''}">
        <div class="log-header">
          <span class="log-date">${r.date}</span>
          <span class="log-badge ${r.synced ? 'synced' : 'pending'}">${r.synced ? '✓ 送信済' : '⏳ 未送信'}</span>
        </div>
        <div class="log-row"><span class="log-key">個数</span><span class="log-val">${r.unitCount.toLocaleString()} 個</span></div>
        <div class="log-row"><span class="log-key">出勤者</span><span class="log-val">${names}</span></div>
      </div>`;
  }).join('');
}

// ============================================================
// 設定
// ============================================================
function saveConfig() {
  const url = document.getElementById('scriptUrl').value.trim();
  if (!url) { alert('URLを入力してください'); return; }
  config = { scriptUrl: url };
  localStorage.setItem('ryogoku_config', JSON.stringify(config));
  updateStatusUI();
  alert('✅ 保存しました');
}

function loadConfig() {
  const s = localStorage.getItem('ryogoku_config');
  if (s) {
    config = JSON.parse(s);
    document.getElementById('scriptUrl').value = config.scriptUrl;
  }
  updateStatusUI();
}

function testConnection() {
  if (!config?.scriptUrl) { alert('URLを設定してください'); return; }
  window.open(config.scriptUrl, '_blank');
  setTimeout(() => {
    const ok = confirm('新しいタブでJSONが表示されましたか？');
    if (ok) { updateStatusUI(true); alert('✅ 接続成功！'); }
    else alert('❌ URLを確認してください');
  }, 2000);
}

function updateStatusUI(forceOk) {
  const dot  = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  if (forceOk || config?.scriptUrl) {
    dot.className  = 'status-dot connected';
    text.textContent = '連携中';
  } else {
    dot.className  = 'status-dot';
    text.textContent = '未設定';
  }
}

// ============================================================
// ローカルストレージ
// ============================================================
function saveLogs() { localStorage.setItem('ryogoku_logs', JSON.stringify(logs)); }
function loadLogs()  {
  const s = localStorage.getItem('ryogoku_logs');
  if (s) logs = JSON.parse(s);
}

// ============================================================
// タブ切り替え
// ============================================================
function switchTab(name, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(name + '-tab').classList.add('active');
  btn.classList.add('active');
  if (name === 'list') renderLogs();
}
</script>
</body>
</html>
