<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>入荷登録システム</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;700&display=swap');

:root {
  --bg:       #f5f2ec;
  --surface:  #ffffff;
  --surface2: #f0ece3;
  --ink:      #1a1714;
  --ink2:     #6b6560;
  --accent:   #bf3a2b;
  --accent2:  #2b6bbf;
  --border:   #ddd8cf;
  --ok:       #2a7d4f;
  --warn:     #c47a00;
  --radius:   10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px;
  min-height: 100vh;
}

/* ── HEADER ── */
header {
  background: var(--ink);
  color: #fff;
  padding: 14px 16px 12px;
  display: flex;
  align-items: flex-end;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.h-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.6rem;
  letter-spacing: 0.08em;
  line-height: 1;
}
.h-sub {
  font-size: 0.7rem;
  color: #aaa;
  letter-spacing: 0.05em;
  padding-bottom: 2px;
}
.h-badge {
  margin-left: auto;
  background: var(--accent);
  font-size: 0.68rem;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 4px;
  letter-spacing: 0.04em;
}

/* ── MAIN ── */
main {
  max-width: 680px;
  margin: 0 auto;
  padding: 16px 14px 48px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* ── CARD ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.card-head {
  background: var(--ink);
  color: #fff;
  padding: 9px 14px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1rem;
  letter-spacing: 0.1em;
  display: flex;
  align-items: center;
  gap: 8px;
}
.card-head .step {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 22px; height: 22px;
  background: var(--accent);
  border-radius: 50%;
  font-size: 0.78rem;
  font-family: 'JetBrains Mono', monospace;
  flex-shrink: 0;
}
.card-body { padding: 14px; }

/* ── FORM ROWS ── */
.form-row {
  display: flex;
  flex-direction: column;
  gap: 4px;
  margin-bottom: 12px;
}
.form-row:last-child { margin-bottom: 0; }
.form-row label {
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: var(--ink2);
  text-transform: uppercase;
}
.form-row label .req { color: var(--accent); margin-left: 2px; }
.form-row label .opt {
  font-weight: 400;
  color: var(--ink2);
  font-size: 0.68rem;
  margin-left: 4px;
  text-transform: none;
}

input[type=text], input[type=date], input[type=tel], select, textarea {
  width: 100%;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 7px;
  padding: 10px 12px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.92rem;
  color: var(--ink);
  transition: border-color 0.15s;
  -webkit-appearance: none;
}
input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: var(--accent2);
  background: #fff;
}
input.mono {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1rem;
  letter-spacing: 0.06em;
}
input.filled { border-color: var(--ok); background: #f0faf5; }
input.manual-mode { border-color: var(--warn); background: #fffbf0; }

.row2 { display: flex; gap: 10px; }
.row2 > * { flex: 1; }

/* ── SCAN AREA ── */
.scan-wrap {
  display: flex;
  gap: 8px;
  align-items: stretch;
}
.scan-wrap input { flex: 1; }
.btn-cam {
  background: var(--ink);
  color: #fff;
  border: none;
  border-radius: 7px;
  padding: 0 14px;
  font-size: 1.2rem;
  cursor: pointer;
  flex-shrink: 0;
  transition: background 0.15s;
}
.btn-cam:hover { background: #333; }
.btn-cam.active { background: var(--accent); }

#scanner-container {
  display: none;
  position: relative;
  background: #000;
  border-radius: 8px;
  overflow: hidden;
  margin-top: 10px;
}
#scanner-container.visible { display: block; }
#scanner-container video { width: 100%; display: block; max-height: 240px; object-fit: cover; }
.scan-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}
.scan-box {
  width: 72%; height: 80px;
  border: 2px solid #fff;
  border-radius: 6px;
  box-shadow: 0 0 0 9999px rgba(0,0,0,0.5);
  position: relative;
}
.scan-box::before {
  content: '';
  position: absolute;
  left: 0; right: 0;
  height: 2px;
  background: var(--accent);
  animation: sl 1.8s ease-in-out infinite;
  top: 20%;
}
@keyframes sl { 0%,100%{top:10%} 50%{top:80%} }

/* ── PRODUCT RESULT ── */
.product-found {
  background: var(--surface2);
  border: 1.5px solid var(--ok);
  border-radius: 8px;
  padding: 10px 12px;
  margin-top: 10px;
  display: none;
}
.product-found.visible { display: block; }
.pf-name {
  font-weight: 700;
  font-size: 0.95rem;
  margin-bottom: 4px;
  line-height: 1.4;
}
.pf-meta {
  font-size: 0.75rem;
  color: var(--ink2);
  font-family: 'JetBrains Mono', monospace;
}
.pf-actions {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}
.btn-use {
  flex: 1;
  background: var(--ok);
  color: #fff;
  border: none;
  border-radius: 7px;
  padding: 9px;
  font-weight: 700;
  font-size: 0.85rem;
  cursor: pointer;
}
.btn-manual {
  flex: 1;
  background: none;
  border: 1.5px solid var(--warn);
  color: var(--warn);
  border-radius: 7px;
  padding: 9px;
  font-weight: 700;
  font-size: 0.85rem;
  cursor: pointer;
}

.manual-name-row {
  display: none;
  margin-top: 10px;
}
.manual-name-row.visible { display: block; }

/* ── LOCATION ── */
.loc-wrap { display: flex; gap: 8px; }
.loc-wrap input { flex: 1; }
.loc-pending {
  background: var(--surface2);
  border: 1.5px dashed var(--warn);
  border-radius: 7px;
  padding: 9px 12px;
  font-size: 0.8rem;
  color: var(--warn);
  font-weight: 700;
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 4px;
  white-space: nowrap;
}

/* ── SENDER ── */
.sender-hint {
  font-size: 0.72rem;
  color: var(--ink2);
  margin-top: 4px;
}

/* ── SUBMIT ── */
.submit-area {
  padding: 14px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 10px;
}
.btn-submit {
  flex: 1;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 14px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.2rem;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: opacity 0.2s;
}
.btn-submit:hover { opacity: 0.88; }
.btn-submit:disabled { opacity: 0.4; cursor: default; }
.btn-reset {
  background: var(--surface2);
  border: 1.5px solid var(--border);
  color: var(--ink2);
  border-radius: 8px;
  padding: 14px 16px;
  cursor: pointer;
  font-size: 0.85rem;
}

/* ── STATUS ── */
#status {
  padding: 8px 14px;
  font-size: 0.78rem;
  min-height: 32px;
  color: var(--ink2);
  display: flex;
  align-items: center;
  gap: 6px;
}
#status.loading { color: var(--accent2); }
#status.ok  { color: var(--ok); font-weight: 700; }
#status.err { color: var(--accent); font-weight: 700; }

.spinner {
  display: inline-block;
  width: 13px; height: 13px;
  border: 2px solid #ccc;
  border-top-color: var(--accent2);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── CONFIG ── */
.config-toggle {
  font-size: 0.72rem;
  color: var(--ink2);
  cursor: pointer;
  text-align: right;
  padding: 6px 14px;
  text-decoration: underline;
  text-decoration-style: dotted;
}
.config-panel {
  background: var(--surface2);
  border-top: 1px solid var(--border);
  padding: 12px 14px;
  display: none;
}
.config-panel.open { display: block; }
.config-panel .form-row { margin-bottom: 10px; }

/* ── HISTORY ── */
.history-head {
  padding: 10px 14px 6px;
  font-family: 'Bebas Neue', sans-serif;
  letter-spacing: 0.1em;
  font-size: 0.95rem;
  color: var(--ink2);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.btn-csv {
  background: none;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  padding: 4px 12px;
  font-size: 0.72rem;
  color: var(--ink2);
  cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
}
.btn-csv:hover { border-color: var(--accent2); color: var(--accent2); }

#historyList { padding: 0 14px 14px; display: flex; flex-direction: column; gap: 8px; }

.h-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 2px 10px;
  animation: fadeUp 0.25s ease;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
.h-name {
  font-size: 0.88rem;
  font-weight: 700;
  grid-column: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.h-time {
  font-size: 0.7rem;
  color: var(--ink2);
  grid-column: 2;
  grid-row: 1 / 3;
  display: flex;
  align-items: center;
  white-space: nowrap;
  font-family: 'JetBrains Mono', monospace;
}
.h-meta {
  grid-column: 1;
  font-size: 0.72rem;
  color: var(--ink2);
  font-family: 'JetBrains Mono', monospace;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.h-loc {
  display: inline-block;
  background: var(--ink);
  color: #fff;
  padding: 1px 7px;
  border-radius: 4px;
  font-size: 0.68rem;
  margin-left: 4px;
  font-family: 'JetBrains Mono', monospace;
}
.h-loc.pending {
  background: var(--warn);
}
.pending-badge {
  font-size: 0.68rem;
  background: var(--warn);
  color: #fff;
  padding: 2px 7px;
  border-radius: 4px;
  cursor: pointer;
  margin-left: 6px;
}

.empty-hist {
  text-align: center;
  color: var(--ink2);
  font-size: 0.8rem;
  padding: 20px;
  border: 1.5px dashed var(--border);
  border-radius: 8px;
}

/* ── TOAST ── */
#toast {
  position: fixed;
  bottom: 20px; left: 50%;
  transform: translateX(-50%) translateY(70px);
  background: var(--ink);
  color: #fff;
  padding: 10px 24px;
  border-radius: 24px;
  font-size: 0.88rem;
  font-weight: 700;
  transition: transform 0.3s ease;
  z-index: 999;
  pointer-events: none;
  white-space: nowrap;
}
#toast.show { transform: translateX(-50%) translateY(0); }

/* ── OCR CARD ── */
.ocr-trigger {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 13px 14px;
  background: linear-gradient(135deg, #1a1714 0%, #2d2620 100%);
  border-radius: var(--radius);
  cursor: pointer;
  border: 1.5px solid #3a3028;
  transition: opacity 0.15s;
  user-select: none;
}
.ocr-trigger:hover { opacity: 0.88; }
.ocr-icon {
  font-size: 1.5rem;
  flex-shrink: 0;
}
.ocr-label { color: #fff; }
.ocr-label strong {
  display: block;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1rem;
  letter-spacing: 0.1em;
}
.ocr-label span {
  font-size: 0.72rem;
  color: #aaa;
}
.ocr-label .badge-ocr {
  display: inline-block;
  background: var(--accent);
  color: #fff;
  font-size: 0.62rem;
  font-weight: 700;
  padding: 1px 7px;
  border-radius: 4px;
  margin-left: 8px;
  vertical-align: middle;
  letter-spacing: 0.04em;
}
.ocr-preview-wrap {
  display: none;
  margin-top: 10px;
  position: relative;
}
.ocr-preview-wrap.visible { display: block; }
#ocrPreview {
  width: 100%;
  border-radius: 8px;
  display: block;
  max-height: 200px;
  object-fit: contain;
  background: #000;
}
.ocr-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.55);
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  display: none;
}
.ocr-overlay.visible { display: flex; }
.ocr-spinner {
  width: 32px; height: 32px;
  border: 3px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
.ocr-overlay-text { color: #fff; font-size: 0.8rem; font-weight: 700; }

.ocr-result-box {
  display: none;
  margin-top: 10px;
  background: var(--surface2);
  border: 1.5px solid var(--ok);
  border-radius: 8px;
  padding: 12px 14px;
}
.ocr-result-box.visible { display: block; }
.ocr-result-title {
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: var(--ok);
  text-transform: uppercase;
  margin-bottom: 10px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 0.9rem;
}
.ocr-field {
  display: flex;
  flex-direction: column;
  gap: 3px;
  margin-bottom: 10px;
}
.ocr-field:last-of-type { margin-bottom: 12px; }
.ocr-field label {
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: var(--ink2);
  text-transform: uppercase;
}
.ocr-field input {
  background: #fff;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  padding: 8px 10px;
  font-size: 0.9rem;
  color: var(--ink);
  font-family: 'Noto Sans JP', sans-serif;
}
.ocr-field input:focus { outline: none; border-color: var(--accent2); }
.ocr-apply-btn {
  width: 100%;
  background: var(--ok);
  color: #fff;
  border: none;
  border-radius: 7px;
  padding: 10px;
  font-weight: 700;
  font-size: 0.9rem;
  cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
}
.ocr-apply-btn:hover { opacity: 0.88; }
.ocr-err {
  display: none;
  margin-top: 8px;
  font-size: 0.78rem;
  color: var(--accent);
  font-weight: 700;
}
.ocr-err.visible { display: block; }

/* hidden file input */
#ocrFileInput { display: none; }

/* ── LOC MODAL ── */
.modal-bg {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 200;
  align-items: center;
  justify-content: center;
}
.modal-bg.open { display: flex; }
.modal {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 20px;
  width: 90%;
  max-width: 360px;
}
.modal h3 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.2rem;
  letter-spacing: 0.08em;
  margin-bottom: 12px;
}
.modal-meta { font-size: 0.78rem; color: var(--ink2); margin-bottom: 14px; }
.modal-btns { display: flex; gap: 10px; margin-top: 14px; }
.modal-btns button { flex: 1; padding: 11px; border-radius: 7px; font-weight: 700; cursor: pointer; font-size: 0.88rem; }
.btn-modal-ok { background: var(--ok); color: #fff; border: none; }
.btn-modal-cancel { background: none; border: 1.5px solid var(--border); color: var(--ink2); }
</style>
</head>
<body>

<header>
  <div>
    <div class="h-title">WAREHOUSE RECEIVE</div>
    <div class="h-sub">入荷登録システム</div>
  </div>
  <div class="h-badge">楽天API + OCR対応</div>
</header>

<main>

<!-- ══ STEP 1: 基本情報 ══ -->
<div class="card">
  <div class="card-head"><span class="step">1</span>基本情報</div>
  <div class="card-body">

    <!-- OCR トリガー -->
    <div class="ocr-trigger" onclick="triggerOcr()">
      <div class="ocr-icon">📸</div>
      <div class="ocr-label">
        <strong>送り状をOCRで読み取る<span class="badge-ocr">AI</span></strong>
        <span>写真を撮るだけで差出人・住所を自動入力</span>
      </div>
    </div>
    <input type="file" id="ocrFileInput" accept="image/*" capture="environment" onchange="handleOcrImage(event)">

    <!-- プレビュー -->
    <div class="ocr-preview-wrap" id="ocrPreviewWrap">
      <img id="ocrPreview" src="" alt="送り状プレビュー">
      <div class="ocr-overlay" id="ocrOverlay">
        <div class="ocr-spinner"></div>
        <div class="ocr-overlay-text">AIが読み取り中...</div>
      </div>
    </div>

    <!-- OCR結果 -->
    <div class="ocr-result-box" id="ocrResultBox">
      <div class="ocr-result-title">読み取り結果 — 確認して適用</div>
      <div class="ocr-field">
        <label>送り状番号</label>
        <input type="tel" class="mono" id="ocrTracking" placeholder="未検出">
      </div>
      <div class="ocr-field">
        <label>差出人名</label>
        <input type="text" id="ocrSender" placeholder="未検出">
      </div>
      <div class="ocr-field">
        <label>差出人住所</label>
        <input type="text" id="ocrAddress" placeholder="未検出">
      </div>
      <button class="ocr-apply-btn" onclick="applyOcrResult()">フォームに反映する</button>
    </div>
    <div class="ocr-err" id="ocrErr"></div>

    <div style="height:12px"></div>

    <div class="row2">
      <div class="form-row">
        <label>到着日<span class="req">*</span></label>
        <input type="date" id="arrivalDate">
      </div>
      <div class="form-row">
        <label>登録時刻</label>
        <input type="text" id="arrivalTime" readonly style="color:var(--ink2)">
      </div>
    </div>
    <div class="form-row">
      <label>送り状番号<span class="req">*</span></label>
      <input type="tel" class="mono" id="trackingNo" placeholder="例: 1234-5678-9012" maxlength="30">
    </div>
    <div class="form-row">
      <label>返送元（差出人）<span class="opt">任意</span></label>
      <input type="text" id="senderName" placeholder="例: 山田 太郎 / ○○株式会社">
      <div class="sender-hint">送り状の差出人名・住所（OCRで自動入力可）</div>
    </div>
    <div class="form-row">
      <label>差出人住所<span class="opt">任意</span></label>
      <input type="text" id="senderAddress" placeholder="例: 東京都渋谷区〇〇1-2-3">
    </div>
  </div>
</div>

<!-- ══ STEP 2: 商品 ══ -->
<div class="card">
  <div class="card-head"><span class="step">2</span>商品情報</div>
  <div class="card-body">
    <div class="form-row">
      <label>JANコード<span class="opt">スキャンまたは手入力</span></label>
      <div class="scan-wrap">
        <input type="tel" class="mono" id="janInput" placeholder="4901234567890" maxlength="14"
               oninput="onJanInput()" onkeydown="if(event.key==='Enter'){event.preventDefault();searchProduct()}">
        <button class="btn-cam" id="camBtn" onclick="toggleCamera()" title="カメラ起動">📷</button>
      </div>
      <div id="scanner-container">
        <div id="interactive"></div>
        <div class="scan-overlay">
          <div class="scan-box"></div>
        </div>
      </div>
    </div>

    <div id="status"></div>

    <!-- 検索結果 -->
    <div class="product-found" id="productFound">
      <div class="pf-name" id="pfName"></div>
      <div class="pf-meta" id="pfMeta"></div>
      <div class="pf-actions">
        <button class="btn-use" onclick="useProduct()">この商品を使用</button>
        <button class="btn-manual" onclick="goManual()">手打ちで入力</button>
      </div>
    </div>

    <!-- 手打ち入力 -->
    <div class="manual-name-row" id="manualNameRow">

<!-- ロケーション後入れモーダル -->
<div class="modal-bg" id="locModal">
  <div class="modal">
    <h3>ロケーション追加</h3>
    <div class="modal-meta" id="locModalMeta"></div>
    <div class="form-row">
      <label>ロケーション番号</label>
      <input type="text" class="mono" id="locModalInput" placeholder="A-01-03">
    </div>
    <div class="modal-btns">
      <button class="btn-modal-ok" onclick="saveLocation()">登録</button>
      <button class="btn-modal-cancel" onclick="closeLocModal()">キャンセル</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ════════════════════════════════════════
//  CONFIG
// ════════════════════════════════════════
let CFG = {
  rakutenId: localStorage.getItem('wh_rakuten_id') || '',
  gasUrl:    localStorage.getItem('wh_gas_url') || '',
  claudeKey: localStorage.getItem('wh_claude_key') || ''
};
let history = JSON.parse(localStorage.getItem('wh_history') || '[]');
let scanning = false;
let lastCode = null;
let currentProduct = null; // { name, code, brand, price }
let locPending = false;
let editLocIdx = null;

// ════════════════════════════════════════
//  INIT
// ════════════════════════════════════════
window.onload = () => {
  // 今日の日付をデフォルト
  const today = new Date();
  document.getElementById('arrivalDate').value = today.toISOString().slice(0, 10);
  updateTime();
  setInterval(updateTime, 30000);

  // 設定読み込み
  if (CFG.rakutenId) document.getElementById('rakutenId').value = CFG.rakutenId;
  if (CFG.gasUrl)    document.getElementById('gasUrl').value    = CFG.gasUrl;
  if (CFG.claudeKey) document.getElementById('claudeKey').value = CFG.claudeKey;

  // API未設定なら設定パネルを開く
  if (!CFG.rakutenId) {
    document.getElementById('configPanel').classList.add('open');
  }

  renderHistory();
};

function updateTime() {
  const now = new Date();
  document.getElementById('arrivalTime').value =
    now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
}

// ════════════════════════════════════════
//  CONFIG PANEL
// ════════════════════════════════════════
function toggleConfig() {
  document.getElementById('configPanel').classList.toggle('open');
}
function saveConfig() {
  CFG.rakutenId = document.getElementById('rakutenId').value.trim();
  CFG.gasUrl    = document.getElementById('gasUrl').value.trim();
  CFG.claudeKey = document.getElementById('claudeKey').value.trim();
  localStorage.setItem('wh_rakuten_id',  CFG.rakutenId);
  localStorage.setItem('wh_gas_url',     CFG.gasUrl);
  localStorage.setItem('wh_claude_key',  CFG.claudeKey);
  document.getElementById('configPanel').classList.remove('open');
  showToast('設定を保存しました');
}

// ════════════════════════════════════════
//  CAMERA
// ════════════════════════════════════════
function toggleCamera() {
  scanning ? stopCamera() : startCamera();
}
function startCamera() {
  const container = document.getElementById('scanner-container');
  const btn = document.getElementById('camBtn');
  container.classList.add('visible');
  btn.classList.add('active');
  btn.textContent = '⏹';

  Quagga.init({
    inputStream: {
      name: 'Live', type: 'LiveStream',
      target: document.getElementById('interactive'),
      constraints: { facingMode: 'environment' }
    },
    decoder: { readers: ['ean_reader','ean_8_reader','code_128_reader'] },
    locate: true
  }, err => {
    if (err) { setStatus('カメラ起動失敗: ' + err, 'err'); return; }
    Quagga.start();
    scanning = true;
  });

  Quagga.onDetected(data => {
    const code = data.codeResult.code;
    if (code === lastCode) return;
    lastCode = code;
    document.getElementById('janInput').value = code;
    stopCamera();
    searchProduct();
  });
}
function stopCamera() {
  if (scanning) { Quagga.stop(); scanning = false; }
  document.getElementById('scanner-container').classList.remove('visible');
  const btn = document.getElementById('camBtn');
  btn.classList.remove('active');
  btn.textContent = '📷';
  lastCode = null;
}

// ════════════════════════════════════════
//  SEARCH
// ════════════════════════════════════════
function onJanInput() {
  const v = document.getElementById('janInput').value.trim();
  if (v.length >= 8 && /^\d+$/.test(v)) {
    // 自動検索は13桁時のみ
    if (v.length === 13) searchProduct();
  }
}

async function searchProduct() {
  const code = document.getElementById('janInput').value.trim();
  if (!code || code.length < 8) return;

  if (!CFG.rakutenId) {
    setStatus('楽天 Application IDを設定してください', 'err');
    document.getElementById('configPanel').classList.add('open');
    return;
  }

  resetProductArea();
  setStatus('楽天市場から商品検索中...', 'loading');

  try {
    // 楽天商品検索API（JANコードで検索）
    const url = `https://app.rakuten.co.jp/services/api/IchibaItem/Search/20220601?applicationId=${CFG.rakutenId}&jan=${code}&hits=1&format=json`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();

    if (!data.Items || data.Items.length === 0) {
      setStatus('楽天市場に商品が見つかりませんでした', 'err');
      showManualInput();
      return;
    }

    const item = data.Items[0].Item;
    currentProduct = {
      code,
      name:  item.itemName,
      brand: item.shopName || '',
      price: item.itemPrice || null,
      url:   item.itemUrl || ''
    };
    displayProductResult(currentProduct);
    setStatus('商品情報を取得しました ✓', 'ok');

  } catch(e) {
    setStatus('取得エラー: ' + e.message, 'err');
    showManualInput();
  }
}

function displayProductResult(p) {
  document.getElementById('pfName').textContent = p.name;
  document.getElementById('pfMeta').textContent =
    `JAN: ${p.code}　${p.brand ? '/ ' + p.brand : ''}${p.price ? '　¥' + p.price.toLocaleString() : ''}`;
  document.getElementById('productFound').classList.add('visible');
}

function useProduct() {
  if (!currentProduct) return;
  document.getElementById('productNameFixed').value = currentProduct.name;
  document.getElementById('productCode').value = currentProduct.code;
  document.getElementById('janInput').classList.add('filled');
  document.getElementById('productFound').classList.remove('visible');
  document.getElementById('manualNameRow').classList.remove('visible');
  setStatus(`✓ ${currentProduct.name}`, 'ok');
}

function goManual() {
  document.getElementById('productFound').classList.remove('visible');
  showManualInput();
}

function showManualInput() {
  document.getElementById('manualNameRow').classList.add('visible');
  document.getElementById('productNameManual').focus();
}

function resetProductArea() {
  currentProduct = null;
  document.getElementById('productFound').classList.remove('visible');
  document.getElementById('manualNameRow').classList.remove('visible');
  document.getElementById('productNameFixed').value = '';
  document.getElementById('productCode').value = '';
  document.getElementById('janInput').classList.remove('filled');
}

// ════════════════════════════════════════
//  QTY
// ════════════════════════════════════════
function changeQty(d) {
  const el = document.getElementById('qtyInput');
  el.value = Math.max(1, (parseInt(el.value) || 1) + d);
}

// ════════════════════════════════════════
//  LOCATION
// ════════════════════════════════════════
function setPending() {
  locPending = true;
  document.getElementById('locationInput').value = '';
  document.getElementById('locationInput').placeholder = '後で追加';
  document.getElementById('locationInput').style.borderColor = 'var(--warn)';
  document.getElementById('locPendingNote').style.display = 'block';
}

// ════════════════════════════════════════
//  SUBMIT
// ════════════════════════════════════════
function submitEntry() {
  // バリデーション
  const date      = document.getElementById('arrivalDate').value;
  const time      = document.getElementById('arrivalTime').value;
  const tracking  = document.getElementById('trackingNo').value.trim();
  const sender    = document.getElementById('senderName').value.trim();
  const senderAddress = document.getElementById('senderAddress').value.trim();
  const jan       = document.getElementById('janInput').value.trim();
  const fixedName = document.getElementById('productNameFixed').value;
  const manualName= document.getElementById('productNameManual').value.trim();
  const productName = fixedName || manualName;
  const qty       = parseInt(document.getElementById('qtyInput').value) || 1;
  const location  = document.getElementById('locationInput').value.trim();

  if (!date)        { shake('arrivalDate');  showToast('到着日を入力してください'); return; }
  if (!tracking)    { shake('trackingNo');   showToast('送り状番号を入力してください'); return; }
  if (!productName) { showToast('商品名を入力または選択してください'); return; }

  const entry = {
    id:        Date.now(),
    date,
    time,
    tracking,
    sender,
    senderAddress,
    jan,
    productName,
    qty,
    location:  location || null,
    locPending: !location,
    registeredAt: new Date().toLocaleString('ja-JP')
  };

  history.unshift(entry);
  localStorage.setItem('wh_history', JSON.stringify(history));
  renderHistory();
  showToast('入荷登録しました ✓');

  // GAS送信
  if (CFG.gasUrl) sendToGas(entry);

  resetForm();
}

function sendToGas(entry) {
  fetch(CFG.gasUrl, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(entry)
  }).catch(console.error);
}

// ════════════════════════════════════════
//  RESET
// ════════════════════════════════════════
function resetForm() {
  document.getElementById('trackingNo').value = '';
  document.getElementById('senderName').value = '';
  document.getElementById('senderAddress').value = '';
  document.getElementById('janInput').value = '';
  document.getElementById('qtyInput').value = '1';
  document.getElementById('locationInput').value = '';
  document.getElementById('locationInput').placeholder = '例: A-01-03';
  document.getElementById('locationInput').style.borderColor = '';
  document.getElementById('locPendingNote').style.display = 'none';
  locPending = false;
  resetProductArea();
  resetOcr();
  setStatus('');
  updateTime();
}

// ════════════════════════════════════════
//  HISTORY
// ════════════════════════════════════════
function renderHistory() {
  const el = document.getElementById('historyList');
  if (!history.length) {
    el.innerHTML = '<div class="empty-hist">登録データがありません</div>';
    return;
  }
  el.innerHTML = history.map((item, idx) => {
    const locBadge = item.locPending
      ? `<span class="h-loc pending" onclick="openLocModal(${idx})">未定 ✏</span>`
      : item.location ? `<span class="h-loc">${esc(item.location)}</span>` : '';
    return `
      <div class="h-item">
        <div class="h-name">${esc(item.productName)}</div>
        <div class="h-time">${item.date}</div>
        <div class="h-meta">
          送状: ${esc(item.tracking)}
          ${item.sender ? ' / ' + esc(item.sender) : ''}
          ${item.senderAddress ? ' ' + esc(item.senderAddress) : ''}
          ${item.jan ? ' / JAN:' + item.jan : ''}
          &nbsp;×${item.qty}
          ${locBadge}
        </div>
      </div>`;
  }).join('');
}

// ════════════════════════════════════════
//  LOC MODAL（後入れ）
// ════════════════════════════════════════
function openLocModal(idx) {
  editLocIdx = idx;
  const item = history[idx];
  document.getElementById('locModalMeta').textContent =
    `${item.productName} / 送状: ${item.tracking}`;
  document.getElementById('locModalInput').value = '';
  document.getElementById('locModal').classList.add('open');
  setTimeout(() => document.getElementById('locModalInput').focus(), 100);
}
function closeLocModal() {
  document.getElementById('locModal').classList.remove('open');
  editLocIdx = null;
}
function saveLocation() {
  const loc = document.getElementById('locModalInput').value.trim();
  if (!loc) { showToast('ロケーション番号を入力してください'); return; }
  history[editLocIdx].location = loc;
  history[editLocIdx].locPending = false;
  localStorage.setItem('wh_history', JSON.stringify(history));
  renderHistory();
  closeLocModal();
  showToast('ロケーションを登録しました');
}

// ════════════════════════════════════════
//  CSV
// ════════════════════════════════════════
function exportCSV() {
  if (!history.length) { showToast('登録データがありません'); return; }
  const header = ['登録日時','到着日','時刻','送り状番号','返送元','差出人住所','JANコード','商品名','数量','ロケーション','ロケーション未定'];
  const rows = history.map(i => [
    i.registeredAt, i.date, i.time, i.tracking,
    i.sender || '', i.senderAddress || '', i.jan || '', i.productName, i.qty,
    i.location || '', i.locPending ? '未定' : '確定'
  ]);
  const bom = '\uFEFF';
  const csv = [header, ...rows]
    .map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([bom + csv], { type: 'text/csv;charset=utf-8' }));
  a.download = `入荷ログ_${new Date().toLocaleDateString('ja-JP').replace(/\//g,'-')}.csv`;
  a.click();
}

// ════════════════════════════════════════
//  STATUS / TOAST / UTILS
// ════════════════════════════════════════
function setStatus(msg, type = '') {
  const el = document.getElementById('status');
  el.className = type;
  if (type === 'loading') {
    el.innerHTML = `<span class="spinner"></span>${msg}`;
  } else {
    el.textContent = msg;
  }
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
function shake(id) {
  const el = document.getElementById(id);
  el.style.animation = 'none';
  el.offsetHeight;
  el.style.animation = 'shake 0.4s ease';
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ════════════════════════════════════════
//  OCR（Claude Vision）
// ════════════════════════════════════════
function triggerOcr() {
  document.getElementById('ocrFileInput').click();
}

async function handleOcrImage(e) {
  const file = e.target.files[0];
  if (!file) return;

  // プレビュー表示
  const reader = new FileReader();
  reader.onload = async (ev) => {
    const base64 = ev.target.result; // data:image/jpeg;base64,...
    const base64Data = base64.split(',')[1];
    const mimeType = file.type || 'image/jpeg';

    document.getElementById('ocrPreview').src = base64;
    document.getElementById('ocrPreviewWrap').classList.add('visible');
    document.getElementById('ocrResultBox').classList.remove('visible');
    document.getElementById('ocrErr').classList.remove('visible');
    document.getElementById('ocrOverlay').classList.add('visible');

    try {
      const result = await callClaudeOcr(base64Data, mimeType);
      document.getElementById('ocrOverlay').classList.remove('visible');
      showOcrResult(result);
    } catch(err) {
      document.getElementById('ocrOverlay').classList.remove('visible');
      const errEl = document.getElementById('ocrErr');
      errEl.textContent = '読み取りエラー: ' + err.message;
      errEl.classList.add('visible');
    }
  };
  reader.readAsDataURL(file);
  // input リセット（同じ画像を再選択できるように）
  e.target.value = '';
}

async function callClaudeOcr(base64Data, mimeType) {
  // GASプロキシ経由（推奨）またはClaude API直接
  const useProxy = !!CFG.gasUrl;
  const useDirectApi = !!CFG.claudeKey;

  if (!useProxy && !useDirectApi) {
    throw new Error('Claude API KeyまたはGAS URLを設定してください');
  }

  const prompt = `この画像は日本の宅配便の送り状（伝票）です。
以下の情報を読み取り、必ずJSON形式のみで返してください。他の文字は一切含めないでください。

{
  "tracking_number": "送り状番号（数字とハイフンのみ、見つからなければnull）",
  "sender_name": "差出人の氏名または会社名（見つからなければnull）",
  "sender_address": "差出人の住所（都道府県から番地まで、見つからなければnull）"
}

注意:
- 送り状番号は12〜14桁の数字が多い
- 差出人は「ご依頼主」「送り主」「差出人」などのラベルの近くにある
- 住所は都道府県名から始まることが多い
- 読み取れない部分はnullにする`;

  let responseText;

  if (useProxy && CFG.gasUrl) {
    // GASプロキシ経由（APIキーをサーバーサイドで管理・推奨）
    const res = await fetch(CFG.gasUrl + '?mode=ocr', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image: base64Data, mimeType, prompt })
    });
    if (!res.ok) throw new Error('GASプロキシエラー: ' + res.status);
    const d = await res.json();
    responseText = d.text;
  } else {
    // Claude API直接（開発・テスト用）
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': CFG.claudeKey,
        'anthropic-version': '2023-06-01'
      },
      body: JSON.stringify({
        model: 'claude-opus-4-5',
        max_tokens: 512,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: mimeType, data: base64Data } },
            { type: 'text', text: prompt }
          ]
        }]
      })
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || 'API error ' + res.status);
    }
    const d = await res.json();
    responseText = d.content[0].text;
  }

  // JSONパース
  const clean = responseText.replace(/```json|```/g, '').trim();
  return JSON.parse(clean);
}

function showOcrResult(result) {
  document.getElementById('ocrTracking').value = result.tracking_number || '';
  document.getElementById('ocrSender').value   = result.sender_name    || '';
  document.getElementById('ocrAddress').value  = result.sender_address || '';
  document.getElementById('ocrResultBox').classList.add('visible');
}

function applyOcrResult() {
  const tracking = document.getElementById('ocrTracking').value.trim();
  const sender   = document.getElementById('ocrSender').value.trim();
  const address  = document.getElementById('ocrAddress').value.trim();

  if (tracking) document.getElementById('trackingNo').value   = tracking;
  if (sender)   document.getElementById('senderName').value   = sender;
  if (address)  document.getElementById('senderAddress').value = address;

  document.getElementById('ocrResultBox').classList.remove('visible');
  document.getElementById('ocrPreviewWrap').classList.remove('visible');
  showToast('フォームに反映しました ✓');
}

function resetOcr() {
  document.getElementById('ocrPreviewWrap').classList.remove('visible');
  document.getElementById('ocrResultBox').classList.remove('visible');

// ── スプレッドシート記録 ──
function doPost(e) {
  const params = e.parameter;

  // OCRプロキシモード
  if (params.mode === 'ocr' || (e.postData && e.postData.contents)) {
    try {
      const body = JSON.parse(e.postData.contents);
      if (body.image) return handleOcrProxy(body);
    } catch(ex) {}
  }

  // 通常の入荷登録
  const d = JSON.parse(e.postData.contents);
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  let sh = ss.getSheetByName('入荷ログ');
  if (!sh) {
    sh = ss.insertSheet('入荷ログ');
    sh.appendRow(['登録日時','到着日','時刻','送り状番号','返送元','差出人住所',
                  'JANコード','商品名','数量','ロケーション','ロケーション状態']);
    sh.setFrozenRows(1);
  }
  sh.appendRow([
    d.registeredAt, d.date, d.time, d.tracking,
    d.sender||'', d.senderAddress||'', d.jan||'', d.productName, d.qty,
    d.location||'', d.locPending ? '未定' : '確定'
  ]);
  return ContentService.createTextOutput('ok');
}

// ── Claude OCR プロキシ ──
function handleOcrProxy(body) {
  const CLAUDE_API_KEY = PropertiesService.getScriptProperties().getProperty('CLAUDE_API_KEY');
  const payload = {
    model: 'claude-opus-4-5',
    max_tokens: 512,
    messages: [{
      role: 'user',
      content: [
        { type: 'image', source: { type: 'base64', media_type: body.mimeType, data: body.image } },
        { type: 'text',  text: body.prompt }
      ]
    }]
  };
  const res = UrlFetchApp.fetch('https://api.anthropic.com/v1/messages', {
    method: 'post',
    contentType: 'application/json',
    headers: {
      'x-api-key': CLAUDE_API_KEY,
      'anthropic-version': '2023-06-01'
    },
    payload: JSON.stringify(payload)
  });
  const data = JSON.parse(res.getContentText());
  return ContentService.createTextOutput(
    JSON.stringify({ text: data.content[0].text })
  ).setMimeType(ContentService.MimeType.JSON);
}
