<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Return Manager</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;700&display=swap');
:root{--bg:#f5f2ec;--surface:#fff;--surface2:#f0ece3;--ink:#1a1714;--ink2:#6b6560;--accent:#bf3a2b;--accent2:#2b6bbf;--border:#ddd8cf;--ok:#2a7d4f;--warn:#c47a00;--returned:#6b35bf;--radius:10px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--ink);font-family:'Noto Sans JP',sans-serif;font-size:14px;min-height:100vh}
header{background:var(--ink);color:#fff;padding:14px 16px 12px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.h-title{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:0.08em;line-height:1}
.h-sub{font-size:0.7rem;color:#aaa;letter-spacing:0.05em;padding-bottom:2px}
main{max-width:680px;margin:0 auto;padding:16px 14px 48px;display:flex;flex-direction:column;gap:14px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.card-head{background:var(--ink);color:#fff;padding:9px 14px;font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:0.1em;display:flex;align-items:center;gap:8px}
.card-head .step{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;background:var(--accent);border-radius:50%;font-size:0.78rem;font-family:'JetBrains Mono',monospace;flex-shrink:0}
.card-body{padding:14px}
.form-row{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.form-row:last-child{margin-bottom:0}
.form-row label{font-size:0.72rem;font-weight:700;letter-spacing:0.08em;color:var(--ink2);text-transform:uppercase}
.form-row label .req{color:var(--accent);margin-left:2px}
.form-row label .opt{font-weight:400;color:var(--ink2);font-size:0.68rem;margin-left:4px;text-transform:none}
input[type=text],input[type=date],input[type=tel],select,textarea{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:7px;padding:10px 12px;font-family:'Noto Sans JP',sans-serif;font-size:0.92rem;color:var(--ink);transition:border-color 0.15s;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent2);background:#fff}
input.mono{font-family:'JetBrains Mono',monospace;font-size:1rem;letter-spacing:0.06em}
input.filled{border-color:var(--ok);background:#f0faf5}
.row2{display:flex;gap:10px}
.row2>*{flex:1}
/* JAN Scanner */
.scan-wrap{display:flex;gap:8px;align-items:stretch}
.scan-wrap input{flex:1}
.btn-cam{background:var(--ink);color:#fff;border:none;border-radius:7px;padding:0 14px;font-size:1.2rem;cursor:pointer;flex-shrink:0;transition:background 0.15s}
.btn-cam.active{background:var(--accent)}
#scanner-container{display:none;position:relative;background:#000;border-radius:8px;overflow:hidden;margin-top:10px}
#scanner-container.visible{display:block}
#scanner-container video{width:100%;height:240px;display:block;object-fit:cover}
#scanner-container canvas{display:none !important}
.scan-overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;pointer-events:none}
.scan-box{width:72%;height:80px;border:2px solid rgba(255,255,255,0.9);border-radius:6px;position:relative;box-shadow:0 0 0 9999px rgba(0,0,0,0.45)}
.scan-line{position:absolute;left:4px;right:4px;height:2px;background:var(--accent);box-shadow:0 0 6px var(--accent);animation:sl 1.8s ease-in-out infinite}
@keyframes sl{0%,100%{top:8%}50%{top:82%}}
.product-found{background:var(--surface2);border:1.5px solid var(--ok);border-radius:8px;padding:10px 12px;margin-top:10px;display:none}
.product-found.visible{display:block}
.pf-name{font-weight:700;font-size:0.95rem;margin-bottom:4px;line-height:1.4}
.pf-meta{font-size:0.75rem;color:var(--ink2);font-family:'JetBrains Mono',monospace}
.pf-actions{display:flex;gap:8px;margin-top:10px}
.btn-use{flex:1;background:var(--ok);color:#fff;border:none;border-radius:7px;padding:9px;font-weight:700;font-size:0.85rem;cursor:pointer}
/* OCR */
.ocr-trigger{display:flex;align-items:center;gap:12px;padding:13px 14px;background:linear-gradient(135deg,#1a1714 0%,#2d2620 100%);border-radius:var(--radius);cursor:pointer;border:1.5px solid #3a3028;transition:opacity 0.15s;user-select:none;margin-bottom:12px}
.ocr-trigger:hover{opacity:0.88}
.ocr-icon{font-size:1.5rem;flex-shrink:0}
.ocr-label{color:#fff}
.ocr-label strong{display:block;font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:0.1em}
.ocr-label span{font-size:0.72rem;color:#aaa}
.badge-ocr{display:inline-block;background:var(--accent);color:#fff;font-size:0.62rem;font-weight:700;padding:1px 7px;border-radius:4px;margin-left:8px;vertical-align:middle}
.scan-btn{display:inline-block;background:var(--surface2);border:1.5px solid var(--border);color:var(--ink2);border-radius:6px;padding:6px 10px;font-size:0.72rem;cursor:pointer;flex-shrink:0;white-space:nowrap;transition:all 0.15s;user-select:none;-webkit-user-select:none}
.scan-btn:hover,.scan-btn:active{background:var(--ok);border-color:var(--ok);color:#fff}
.scan-file-input{position:absolute;width:1px;height:1px;opacity:0;overflow:hidden;left:-9999px}
.input-scan-row{display:flex;gap:6px;align-items:center}
.input-scan-row>input,.input-scan-row>.mono{flex:1;min-width:0}
.tess-progress-wrap{display:none;margin-bottom:10px;background:var(--surface2);border:1.5px solid var(--ok);border-radius:8px;padding:10px 14px}
.tess-progress-wrap.visible{display:block}
.tess-progress-label{font-size:0.75rem;color:var(--ok);font-weight:700;margin-bottom:6px}
.tess-bar-bg{background:#ddd;border-radius:4px;height:6px;overflow:hidden}
.tess-bar{background:var(--ok);height:6px;width:0%;transition:width 0.2s;border-radius:4px}
.ocr-preview-wrap{display:none;margin-bottom:10px;position:relative}
.ocr-preview-wrap.visible{display:block}
#ocrPreview{width:100%;border-radius:8px;display:block;max-height:200px;object-fit:contain;background:#000}
.ocr-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.55);border-radius:8px;display:none;flex-direction:column;align-items:center;justify-content:center;gap:8px}
.ocr-overlay.visible{display:flex}
.ocr-spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite}
.ocr-overlay-text{color:#fff;font-size:0.8rem;font-weight:700}
@keyframes spin{to{transform:rotate(360deg)}}
.ocr-tokens-box{display:none;margin-bottom:12px;background:var(--surface2);border:1.5px solid var(--accent2);border-radius:8px;padding:12px 14px}
.ocr-tokens-box.visible{display:block}
.ocr-tokens-title{font-family:'Bebas Neue',sans-serif;font-size:0.9rem;letter-spacing:0.08em;color:var(--accent2);margin-bottom:3px}
.ocr-tokens-hint{font-size:0.72rem;color:var(--ink2);margin-bottom:10px}
.ocr-tokens-list{display:flex;flex-direction:column;gap:6px;max-height:300px;overflow-y:auto}
.ocr-token-row{display:flex;align-items:flex-start;gap:6px;padding:7px 10px;background:#fff;border:1.5px solid var(--border);border-radius:7px}
.ocr-token-text{flex:1;font-size:0.88rem;color:var(--ink);word-break:break-all;line-height:1.4;padding-top:2px}
.ocr-token-btns{display:flex;gap:4px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;max-width:180px}
.ocr-token-btn{border:none;border-radius:4px;padding:4px 8px;font-size:0.65rem;font-weight:700;cursor:pointer;white-space:nowrap;font-family:'Noto Sans JP',sans-serif;margin-bottom:2px}
.ocr-token-btn.t-old{background:#e8f0fe;color:#1a56db}
.ocr-token-btn.t-new{background:#fef3e2;color:var(--warn)}
.ocr-token-btn.t-recv{background:#e6f4ea;color:var(--ok)}
.ocr-token-btn.t-item{background:#f3e8ff;color:var(--returned)}
.ocr-tokens-close{width:100%;margin-top:10px;background:none;border:1.5px solid var(--border);color:var(--ink2);border-radius:7px;padding:8px;font-size:0.82rem;cursor:pointer}
.ocr-err{display:none;margin-bottom:8px;font-size:0.78rem;color:var(--accent);font-weight:700}
.ocr-err.visible{display:block}
#ocrFileInput{display:none}
/* Return reason */
.reason-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:4px}
.reason-chip{background:var(--surface2);border:1.5px solid var(--border);border-radius:7px;padding:8px 10px;font-size:0.82rem;cursor:pointer;text-align:center;transition:all 0.15s;user-select:none}
.reason-chip.selected{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700}
.reason-other{margin-top:6px;display:none}
.reason-other.visible{display:block}
/* Submit */
.submit-area{padding:14px;border-top:1px solid var(--border);display:flex;gap:10px}
.btn-submit{flex:1;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:14px;font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:0.1em;cursor:pointer;transition:opacity 0.2s}
.btn-submit:hover{opacity:0.88}
.btn-reset{background:var(--surface2);border:1.5px solid var(--border);color:var(--ink2);border-radius:8px;padding:14px 16px;cursor:pointer;font-size:0.85rem}
#status{padding:8px 14px;font-size:0.78rem;min-height:32px;color:var(--ink2);display:flex;align-items:center;gap:6px}
#status.loading{color:var(--accent2)}
#status.ok{color:var(--ok);font-weight:700}
#status.err{color:var(--accent);font-weight:700}
.spinner-sm{display:inline-block;width:13px;height:13px;border:2px solid #ccc;border-top-color:var(--accent2);border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0}
/* Loc */
.loc-wrap{display:flex;gap:8px}
.loc-wrap input{flex:1}
.loc-pending{background:var(--surface2);border:1.5px dashed var(--warn);border-radius:7px;padding:9px 12px;font-size:0.8rem;color:var(--warn);font-weight:700;cursor:pointer;flex-shrink:0;display:flex;align-items:center;gap:4px;white-space:nowrap}
/* Config */
.config-toggle{font-size:0.72rem;color:var(--ink2);cursor:pointer;text-align:right;padding:6px 14px;text-decoration:underline;text-decoration-style:dotted}
.config-panel{background:var(--surface2);border-top:1px solid var(--border);padding:12px 14px;display:none}
.config-panel.open{display:block}
.config-panel .form-row{margin-bottom:10px}
/* History */
.history-head{padding:10px 14px 6px;font-family:'Bebas Neue',sans-serif;letter-spacing:0.1em;font-size:0.95rem;color:var(--ink2);display:flex;justify-content:space-between;align-items:center}
.btn-csv{background:none;border:1.5px solid var(--border);border-radius:6px;padding:4px 12px;font-size:0.72rem;color:var(--ink2);cursor:pointer;font-family:'Noto Sans JP',sans-serif}
.btn-csv:hover{border-color:var(--accent2);color:var(--accent2)}
.search-bar{display:flex;gap:8px;padding:12px 14px;border-bottom:1px solid var(--border)}
.search-bar input{flex:1;background:var(--surface2);border:1.5px solid var(--border);border-radius:7px;padding:9px 12px;font-size:0.88rem;color:var(--ink)}
.search-bar input:focus{outline:none;border-color:var(--accent2);background:#fff}
.btn-srch{background:var(--ink);color:#fff;border:none;border-radius:7px;padding:9px 14px;font-size:0.82rem;font-weight:700;cursor:pointer;white-space:nowrap}
#historyList{padding:0 14px 14px;display:flex;flex-direction:column;gap:8px}
#syncStatus{padding:8px 14px;font-size:0.78rem;color:var(--accent2);display:none;align-items:center;gap:6px}
.h-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;animation:fadeUp 0.25s ease}
.h-item.returned{border-color:var(--returned);background:#f8f4ff}
.h-item.alert-over{border-color:var(--accent);background:#fff5f5}
.h-item.alert-soon{border-color:var(--warn);background:#fffbf0}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.h-row1{display:flex;align-items:flex-start;gap:8px;margin-bottom:3px}
.h-name{font-size:0.88rem;font-weight:700;flex:1;line-height:1.4}
.h-date{font-size:0.7rem;color:var(--ink2);white-space:nowrap;font-family:'JetBrains Mono',monospace;flex-shrink:0}
.h-meta{font-size:0.72rem;color:var(--ink2);font-family:'JetBrains Mono',monospace;line-height:1.7}
.h-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.h-btn{border:none;border-radius:5px;padding:5px 11px;font-size:0.72rem;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif}
.h-btn-edit{background:var(--surface2);border:1.5px solid var(--border);color:var(--ink2)}
.h-btn-loc{background:var(--warn);color:#fff}
.h-btn-return{background:var(--returned);color:#fff}
.h-btn-unreturn{background:var(--surface2);border:1.5px solid var(--returned);color:var(--returned)}
.h-loc{display:inline-block;background:var(--ink);color:#fff;padding:1px 7px;border-radius:4px;font-size:0.68rem;margin-right:4px;font-family:'JetBrains Mono',monospace}
.h-loc.pending{background:var(--warn)}
.h-badge-ret{display:inline-block;background:var(--returned);color:#fff;padding:1px 8px;border-radius:4px;font-size:0.68rem;font-weight:700;margin-right:4px}
.h-badge-unret{display:inline-block;background:var(--accent);color:#fff;padding:1px 8px;border-radius:4px;font-size:0.68rem;font-weight:700;margin-right:4px}
.h-deadline{font-size:0.7rem;font-weight:700;padding:1px 8px;border-radius:4px;margin-left:4px;display:inline-block}
.h-deadline.over{background:var(--accent);color:#fff}
.h-deadline.soon{background:var(--warn);color:#fff}
.h-deadline.ok{background:var(--ok);color:#fff}
.empty-hist{text-align:center;color:var(--ink2);font-size:0.8rem;padding:20px;border:1.5px dashed var(--border);border-radius:8px}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--ink);color:#fff;padding:10px 24px;border-radius:24px;font-size:0.88rem;font-weight:700;transition:transform 0.3s ease;z-index:999;pointer-events:none;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0)}
/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius);padding:20px;width:92%;max-width:420px;max-height:92vh;overflow-y:auto}
.modal h3{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:0.08em;margin-bottom:6px}
.modal-meta{font-size:0.78rem;color:var(--ink2);margin-bottom:14px;line-height:1.5;border-bottom:1px solid var(--border);padding-bottom:10px}
.modal-btns{display:flex;gap:10px;margin-top:14px}
.modal-btns button{flex:1;padding:11px;border-radius:7px;font-weight:700;cursor:pointer;font-size:0.88rem}
.btn-modal-ok{background:var(--ok);color:#fff;border:none}
.btn-modal-cancel{background:none;border:1.5px solid var(--border);color:var(--ink2)}
/* Sync modal */
.sync-modal-body{display:flex;flex-direction:column;gap:10px}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}60%{transform:translateX(6px)}80%{transform:translateX(-3px)}}
</style>
</head>
<body>
<header>
  <div>
    <div class="h-title">RETURN MANAGER</div>
    <div class="h-sub">返品管理システム</div>
  </div>
  <img id="logoImg" src="" alt="Gworker" style="height:56px;object-fit:contain;margin-left:auto">
</header>
<main>

<!-- STEP 1: 返品情報 -->
<div class="card">
  <div class="card-head"><span class="step">1</span>返品情報</div>
  <div class="card-body">

    <!-- OCR: AI解析ボタン（上段）-->
    <div class="ocr-trigger" onclick="triggerAiOcr()">
      <div class="ocr-icon">🤖</div>
      <div class="ocr-label">
        <strong>送り状をスキャン<span class="badge-ocr">AI</span></strong>
        <span>撮影→テキスト認識→各欄に反映</span>
      </div>
    </div>
    <input type="file" id="ocrFileInputFast" accept="image/*" capture="environment" onchange="handleFastOcr(event)" style="position:absolute;width:1px;height:1px;opacity:0;overflow:hidden;left:-9999px">
    <input type="file" id="ocrFileInputAi"   accept="image/*" capture="environment" onchange="handleAiOcr(event)" style="position:absolute;width:1px;height:1px;opacity:0;overflow:hidden;left:-9999px">
    <!-- Tesseract進捗（高速スキャン用）-->
    <div class="tess-progress-wrap" id="tessProgress">
      <div class="tess-progress-label" id="tessLabel">解析中...</div>
      <div class="tess-bar-bg"><div class="tess-bar" id="tessBar"></div></div>
    </div>
    <div class="ocr-preview-wrap" id="ocrPreviewWrap">
      <img id="ocrPreview" src="" alt="">
      <div class="ocr-overlay" id="ocrOverlay">
        <div class="ocr-spinner"></div>
        <div class="ocr-overlay-text">テキスト読み取り中...</div>
      </div>
    </div>
    <div class="ocr-tokens-box" id="ocrTokensBox">
      <div class="ocr-tokens-title">読み取り結果</div>
      <div class="ocr-tokens-hint">ボタンをタップして各欄に反映 — 複数回タップ可能</div>
      <div class="ocr-tokens-list" id="ocrTokensList"></div>
      <button class="ocr-tokens-close" onclick="resetOcr()">閉じる</button>
    </div>
    <div class="ocr-err" id="ocrErr"></div>

    <!-- 基本情報 -->
    <div class="row2">
      <div class="form-row">
        <label>到着日<span class="req">*</span></label>
        <input type="date" id="arrivalDate">
      </div>
      <div class="form-row">
        <label>登録時刻</label>
        <input type="text" id="arrivalTime" readonly style="color:var(--ink2)">
      </div>
    </div>
    <div class="form-row">
      <label>旧送り状番号<span class="req">*</span></label>
      <div class="input-scan-row">
        <input type="tel" class="mono" id="oldTrackingNo" placeholder="元の発送時の番号" maxlength="30">
        <label class="scan-btn" for="scanInput_oldTrackingNo">⚡ スキャン</label>
        <input class="scan-file-input" type="file" id="scanInput_oldTrackingNo" accept="image/*" capture="environment" onchange="handleDirectScan(event,'oldTrackingNo')">
      </div>
    </div>
    <div class="form-row">
      <label>返送時の送り状番号<span class="opt">任意</span></label>
      <div class="input-scan-row">
        <input type="tel" class="mono" id="returnTrackingNo" placeholder="返送に使用した伝票番号" maxlength="30">
        <label class="scan-btn" for="scanInput_returnTrackingNo">⚡ スキャン</label>
        <input class="scan-file-input" type="file" id="scanInput_returnTrackingNo" accept="image/*" capture="environment" onchange="handleDirectScan(event,'returnTrackingNo')">
      </div>
    </div>
    <div class="form-row">
      <label>受取人氏名<span class="req">*</span></label>
      <div class="input-scan-row">
        <input type="text" id="recipientName" placeholder="例: 山田 太郎 / ○○株式会社">
        <label class="scan-btn" for="scanInput_recipientName">⚡ スキャン</label>
        <input class="scan-file-input" type="file" id="scanInput_recipientName" accept="image/*" capture="environment" onchange="handleDirectScan(event,'recipientName')">
      </div>
    </div>
    <div class="form-row">
      <label>受取人住所<span class="opt">任意</span></label>
      <input type="text" id="recipientAddress" placeholder="例: 東京都渋谷区〇〇1-2-3">
    </div>
    <div class="form-row">
      <label>商品名・荷姿<span class="req">*</span></label>
      <div class="input-scan-row">
        <input type="text" id="itemName" placeholder="例: 化粧品 / 衣類 / 精密機器">
        <label class="scan-btn" for="scanInput_itemName">⚡ スキャン</label>
        <input class="scan-file-input" type="file" id="scanInput_itemName" accept="image/*" capture="environment" onchange="handleDirectScan(event,'itemName')">
      </div>
    </div>
    <div class="form-row">
      <label>返送理由<span class="opt">任意</span></label>
      <div class="reason-grid">
        <div class="reason-chip" onclick="toggleReason(this,'住所不明')">住所不明</div>
        <div class="reason-chip" onclick="toggleReason(this,'長期不在')">長期不在</div>
        <div class="reason-chip" onclick="toggleReason(this,'保管期限切れ')">保管期限切れ</div>
        <div class="reason-chip" onclick="toggleReason(this,'受取拒否')">受取拒否</div>
        <div class="reason-chip" onclick="toggleReason(this,'その他キャンセル')">その他キャンセル</div>
        <div class="reason-chip" onclick="toggleReason(this,'自由入力')">その他（自由入力）</div>
      </div>
      <div class="reason-other" id="reasonOther">
        <input type="text" id="reasonOtherText" placeholder="返送理由を入力">
      </div>
    </div>
    <div class="form-row">
      <label>数量<span class="req">*</span></label>
      <div style="display:flex;gap:8px;align-items:center">
        <button onclick="changeQty(-1)" style="width:38px;height:38px;border:1.5px solid var(--border);border-radius:7px;font-size:1.1rem;cursor:pointer;background:var(--surface2)">−</button>
        <input type="tel" id="qtyInput" value="1" style="width:70px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:1.1rem;font-weight:700">
        <button onclick="changeQty(1)" style="width:38px;height:38px;border:1.5px solid var(--border);border-radius:7px;font-size:1.1rem;cursor:pointer;background:var(--surface2)">＋</button>
      </div>
    </div>
  </div>
</div>

<!-- STEP 2: ロケーション -->
<div class="card">
  <div class="card-head"><span class="step">2</span>ロケーション</div>
  <div class="card-body">
    <div class="form-row">
      <label>ロケーション番号<span class="opt">後で追加可</span></label>
      <div class="loc-wrap">
        <input type="text" class="mono" id="locationInput" placeholder="例: A-01-03">
        <div class="loc-pending" onclick="setPending()">⏳ 後で</div>
      </div>
    </div>
    <div id="locPendingNote" style="display:none;font-size:0.75rem;color:var(--warn);margin-top:4px;font-weight:700">
      ⚠ ロケーション未定
    </div>
  </div>
</div>

<!-- STEP 3: JANコード検索（オプション） -->
<div class="card">
  <div class="card-head" style="cursor:pointer" onclick="toggleJanPanel()">
    <span class="step">3</span>JANコード検索
    <span style="font-size:0.75rem;font-weight:400;color:#aaa;margin-left:6px">任意 — ヒットすれば商品名に反映</span>
    <span id="janToggleIcon" style="margin-left:auto;font-size:0.9rem">▼</span>
  </div>
  <div id="janPanel" style="position:absolute;width:1px;height:1px;opacity:0;overflow:hidden;left:-9999px">
    <div class="card-body">
      <div class="form-row" style="margin:0">
        <label>JANコード<span class="opt">スキャンまたは手入力</span></label>
        <div class="scan-wrap">
          <input type="tel" class="mono" id="janInput" placeholder="4901234567890" maxlength="14"
                 oninput="onJanInput()" onkeydown="if(event.key==='Enter'){event.preventDefault();searchProduct()}">
          <button class="btn-cam" id="camBtn" onclick="toggleCamera()">📷</button>
        </div>
        <div id="scanner-container">
          <div id="interactive"></div>
          <div class="scan-overlay"><div class="scan-box"><div class="scan-line"></div></div></div>
        </div>
      </div>
      <div id="status"></div>
      <div class="product-found" id="productFound">
        <div class="pf-name" id="pfName"></div>
        <div class="pf-meta" id="pfMeta"></div>
        <div class="pf-actions">
          <button class="btn-use" onclick="useProduct()">商品名・荷姿に反映</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 登録 -->
<div class="card">
  <div class="submit-area">
    <button class="btn-submit" onclick="submitEntry()">入 荷 登 録</button>
    <button class="btn-reset" onclick="resetForm()">リセット</button>
  </div>
  <div class="config-toggle" onclick="toggleConfig()">⚙ API設定</div>
  <div class="config-panel" id="configPanel">
    <div class="form-row">
      <label>Yahoo! Client ID</label>
      <input type="password" id="yahooId" placeholder="Yahoo! Client ID">
    </div>
    <div class="form-row">
      <label>GASウェブアプリURL</label>
      <input type="text" id="gasUrl" placeholder="https://script.google.com/macros/s/...">
    </div>
    <div class="form-row">
      <label>返送期限（到着日から何日）</label>
      <div style="display:flex;gap:8px;align-items:center">
        <input type="tel" id="deadlineDays" placeholder="例: 14" style="width:100px">
        <span style="font-size:0.82rem;color:var(--ink2)">日以内 / 0で無効</span>
      </div>
    </div>
    <button class="btn-use" style="width:100%;margin-top:4px" onclick="saveConfig()">保存</button>
  </div>
</div>

<!-- 履歴 -->
<div class="card">
  <div class="history-head">
    <span>登録履歴</span>
    <div style="display:flex;gap:6px">
      <button class="btn-csv" onclick="openSyncModal()" id="syncBtn">↓ シート読込</button>
      <button class="btn-csv" onclick="exportCSV()">CSV出力</button>
    </div>
  </div>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="送り状番号 / 氏名 / 商品名で検索..."
           oninput="renderHistory()" onkeydown="if(event.key==='Enter')renderHistory()">
    <button class="btn-srch" onclick="renderHistory()">検索</button>
  </div>
  <div id="syncStatus"></div>
  <div id="historyList"></div>
</div>
</main>

<!-- 編集モーダル -->
<div class="modal-bg" id="editModal">

    </div>
  </div>
</div>
<!-- ロケーションモーダル -->
<div class="modal-bg" id="locModal">

function save(){localStorage.setItem('wh_history',JSON.stringify(history));}
function renderHistory(){
  const el=document.getElementById('historyList');
  const q=(document.getElementById('searchInput').value||'').trim().toLowerCase();
  let list=q?history.filter(i=>
    (i.oldTracking||'').toLowerCase().includes(q)||
    (i.returnTracking||'').toLowerCase().includes(q)||
    (i.recipient||'').toLowerCase().includes(q)||
    (i.itemName||'').toLowerCase().includes(q)
  ):history;
  if(!list.length){el.innerHTML=`<div class="empty-hist">${q?'検索結果なし':'登録データがありません'}</div>`;return;}
  const today=new Date();today.setHours(0,0,0,0);
  el.innerHTML=list.map(item=>{
    const idx=history.indexOf(item);
    const locB=item.locPending?`<span class="h-loc pending">未定</span>`:item.location?`<span class="h-loc">${esc(item.location)}</span>`:'';
    const retB=item.returned?`<span class="h-badge-ret">返送済</span>`:`<span class="h-badge-unret">未返送</span>`;
    let alertClass='',deadlineBadge='';
    if(CFG.deadlineDays>0&&!item.returned&&item.date){
      const arr=new Date(item.date);arr.setHours(0,0,0,0);
      const dl=new Date(arr);dl.setDate(dl.getDate()+CFG.deadlineDays);
      const diff=Math.ceil((dl-today)/86400000);
      if(diff<0){alertClass='alert-over';deadlineBadge=`<span class="h-deadline over">期限超過${Math.abs(diff)}日</span>`;}
      else if(diff<=3){alertClass='alert-soon';deadlineBadge=`<span class="h-deadline soon">期限まで${diff}日</span>`;}
      else{deadlineBadge=`<span class="h-deadline ok">${diff}日後</span>`;}
    }
    return`<div class="h-item${item.returned?' returned':''} ${alertClass}">
      <div class="h-row1">
        <div class="h-name">${retB}${esc(item.itemName)}${deadlineBadge}</div>
        <div class="h-date">${item.date}</div>
      </div>
      <div class="h-meta">
        ${locB}旧送状: ${esc(item.oldTracking)}${item.returnTracking?' / 返送: '+esc(item.returnTracking):''}
        ${item.recipient?' / '+esc(item.recipient):''}
        ${item.reason?' / '+esc(item.reason):''}
        ×${item.qty}
        ${item.returned&&item.returnedDate?' / 返送日:'+item.returnedDate:''}
      </div>
      <div class="h-actions">
        <button class="h-btn h-btn-edit" onclick="openEditModal(${idx})">✏ 編集</button>
        ${item.locPending?`<button class="h-btn h-btn-loc" onclick="openLocModal(${idx})">📍 ロケ追加</button>`:''}
        ${item.returned?`<button class="h-btn h-btn-unreturn" onclick="toggleReturn(${idx})">↩ 返送取消</button>`:`<button class="h-btn h-btn-return" onclick="openReturnModal(${idx})">📦 未返送</button>`}
      </div>
    </div>`;
  }).join('');
}

// ══════════════════════════════════════
//  OCR — 高速（Tesseract.js） & AI（Claude）
// ══════════════════════════════════════
let tessWorker = null;

// Tesseract ワーカーを遅延ロード
async function getTessWorker() {
  if (tessWorker) return tessWorker;
  // Tesseract.js v4 CDN
  if (!window.Tesseract) {
    await new Promise((res, rej) => {
      const s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/4.1.1/tesseract.min.js';
      s.onload = res; s.onerror = rej;
      document.head.appendChild(s);
    });
  }
  tessWorker = await Tesseract.createWorker('jpn+eng', 1, {
    logger: m => {
      if (m.status === 'recognizing text') {
        const pct = Math.round(m.progress * 100);
        document.getElementById('tessBar').style.width = pct + '%';
        document.getElementById('tessLabel').textContent = `解析中... ${pct}%`;
      }
    }
  });
  return tessWorker;
}

// ─── 各フィールド直接スキャン ───
async function handleDirectScan(e, fieldId) {
  const file = e.target.files[0]; if (!file) return;
  e.target.value = '';
  // Tesseractで認識
  resetOcr();
  const resized = await resizeImage(file, 1200);
  document.getElementById('ocrPreview').src = resized;
  document.getElementById('ocrPreviewWrap').classList.add('visible');
  document.getElementById('tessProgress').classList.add('visible');
  document.getElementById('tessBar').style.width = '0%';
  document.getElementById('tessLabel').textContent = 'スキャン中...';
  try {
    const worker = await getTessWorker();
    const { data } = await worker.recognize(resized);
    document.getElementById('tessProgress').classList.remove('visible');
    const lines = data.text.split('\n')
      .map(l => l.trim())
      .filter(l => l.length >= 2);
    if (lines.length > 0) {
      document.getElementById(fieldId).value = lines[0];
      showToast('スキャン完了 ✓');
    } else {
      showToast('文字を検出できませんでした');
    }
  } catch(err) {
    document.getElementById('tessProgress').classList.remove('visible');
    const el = document.getElementById('ocrErr');
    el.textContent = 'スキャンエラー: ' + err.message; el.classList.add('visible');
  }
}

// ⚡ 高速スキャン（Tesseract.js）
// targetFieldId: 直接セットしたいフィールドのID（省略時はトークン一覧を表示）
let _fastOcrTarget = null;
function triggerFastOcr() { _fastOcrTarget = null; document.getElementById('ocrFileInputFast').click(); }
function triggerFastOcrFor(fieldId) { _fastOcrTarget = fieldId; document.getElementById('ocrFileInputFast').click(); }

async function handleFastOcr(e) {
  const file = e.target.files[0]; if (!file) return;
  e.target.value = '';
  resetOcr();
  const resized = await resizeImage(file, 1200);
  document.getElementById('ocrPreview').src = resized;
  document.getElementById('ocrPreviewWrap').classList.add('visible');
  document.getElementById('tessProgress').classList.add('visible');
  document.getElementById('tessBar').style.width = '0%';
  document.getElementById('tessLabel').textContent = 'Tesseractを初期化中...';
  try {
    const worker = await getTessWorker();
    document.getElementById('tessLabel').textContent = '解析中... 0%';
    const { data } = await worker.recognize(resized);
    document.getElementById('tessProgress').classList.remove('visible');
    // テキストを行単位で分割・クリーニング
    const lines = data.text.split('
')
      .map(l => l.trim())
      .filter(l => l.length >= 2 && !/^[\s\-_=\.\,\/]+$/.test(l));
    // 重複除去
    const unique = [...new Set(lines)].slice(0, 25);
    // 直接セットモード
    if (_fastOcrTarget && unique.length > 0) {
      document.getElementById(_fastOcrTarget).value = unique[0];
      showToast('スキャン完了 ✓');
      _fastOcrTarget = null;
    } else {
      showOcrTokens(unique, '⚡ 高速スキャン結果');
    }
  } catch(err) {
    document.getElementById('tessProgress').classList.remove('visible');
    const el = document.getElementById('ocrErr');
    el.textContent = '高速OCRエラー: ' + err.message; el.classList.add('visible');
  }
}

function triggerAiOcr() { document.getElementById('ocrFileInputAi').click(); }
async function handleAiOcr(e) {

  }

function resizeImage(file, maxWidth) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxWidth / img.width);
        const w = Math.round(img.width * scale), h = Math.round(img.height * scale);
        const canvas = document.createElement('canvas'); canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.85));
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function callClaudeOcrTokens(base64Data) {
  const gasUrl = CFG.gasUrl || GAS_DEFAULT;
  const prompt = `この画像（日本の宅配便の送り状）に含まれる全てのテキストを読み取ってください。
以下の項目が特に重要です: 送り状番号・氏名・会社名・住所・品名・数量
必ずJSON形式のみで返してください。

{"items":["テキスト1","テキスト2","テキスト3",...]}

ルール:
- 意味のある単位（番号・氏名・住所・品名など）で分割
- 数字列は1つの番号として扱う（複数あれば別々に）
- 空白や記号のみは除外
- 類似の重複は1つにまとめる
- 20件以内`;
  const res = await fetch(gasUrl, { method: 'POST', headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ mode: 'ocr', image: base64Data, mimeType: 'image/jpeg', prompt }) });
  if (!res.ok) throw new Error('GAS error: ' + res.status);
  const d = await res.json();
  if (d.error) throw new Error(d.error);
  if (!d.text) throw new Error('レスポンスが空です');
  const parsed = JSON.parse(d.text.replace(/```json|```/g, '').trim());
  return parsed.items || [];
}

function showOcrTokens(tokens, title) {
  const list = document.getElementById('ocrTokensList');
  document.getElementById('ocrTokensBox').querySelector('.ocr-tokens-title').textContent = title || '読み取り結果';
  if (!tokens.length) {
    list.innerHTML = '<div style="font-size:0.8rem;color:var(--ink2);text-align:center;padding:10px">テキストが検出されませんでした</div>';
  } else {
    list.innerHTML = tokens.map((text, i) => `
      <div class="ocr-token-row">
        <div class="ocr-token-text">${esc(text)}</div>
        <div class="ocr-token-btns">
          <button class="ocr-token-btn t-old"  onclick="applyToken(${i},'old')">旧送状番号</button>
          <button class="ocr-token-btn t-new"  onclick="applyToken(${i},'new')">返送番号</button>
          <button class="ocr-token-btn t-recv" onclick="applyToken(${i},'recv')">受取人名</button>
          <button class="ocr-token-btn t-item" onclick="applyToken(${i},'item')">商品名</button>
        </div>
      </div>`).join('');
  }
  window._ocrTokens = tokens;
  document.getElementById('ocrTokensBox').classList.add('visible');
}

function applyToken(idx, field) {
  const text = (window._ocrTokens || [])[idx] || '';
  const map = { old: 'oldTrackingNo', new: 'returnTrackingNo', recv: 'recipientName', item: 'itemName' };
  if (map[field]) { document.getElementById(map[field]).value = text; showToast('反映しました ✓'); }
}

function resetOcr() {
  ['ocrPreviewWrap','ocrTokensBox','ocrErr','ocrOverlay','tessProgress'].forEach(id =>
    document.getElementById(id).classList.remove('visible'));
  document.getElementById('ocrPreview').src='';window._ocrTokens=[];
}

// UTILS
function setStatus(msg,type=''){
  const el=document.getElementById('status');el.className=type;
  el.innerHTML=type==='loading'?`<span class="spinner-sm"></span>${msg}`:msg;
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
function shake(id){const el=document.getElementById(id);el.style.animation='none';el.offsetHeight;el.style.animation='shake 0.4s ease';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
