<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Return Manager</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;700&display=swap');

:root {
  --bg:#f5f2ec; --surface:#fff; --surface2:#f0ece3;
  --ink:#1a1714; --ink2:#6b6560; --accent:#bf3a2b; --accent2:#2b6bbf;
  --border:#ddd8cf; --ok:#2a7d4f; --warn:#c47a00; --returned:#6b35bf;
  --radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--ink);font-family:'Noto Sans JP',sans-serif;font-size:14px;min-height:100vh}

header{background:var(--ink);color:#fff;padding:14px 16px 12px;display:flex;align-items:flex-end;gap:12px;position:sticky;top:0;z-index:100}
.h-title{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:0.08em;line-height:1}
.h-sub{font-size:0.7rem;color:#aaa;letter-spacing:0.05em;padding-bottom:2px}
.h-badge{margin-left:auto;background:var(--accent);font-size:0.68rem;font-weight:700;padding:3px 10px;border-radius:4px;letter-spacing:0.04em}

main{max-width:680px;margin:0 auto;padding:16px 14px 48px;display:flex;flex-direction:column;gap:14px}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.card-head{background:var(--ink);color:#fff;padding:9px 14px;font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:0.1em;display:flex;align-items:center;gap:8px}
.card-head .step{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;background:var(--accent);border-radius:50%;font-size:0.78rem;font-family:'JetBrains Mono',monospace;flex-shrink:0}
.card-body{padding:14px}

.form-row{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.form-row:last-child{margin-bottom:0}
.form-row label{font-size:0.72rem;font-weight:700;letter-spacing:0.08em;color:var(--ink2);text-transform:uppercase}
.form-row label .req{color:var(--accent);margin-left:2px}
.form-row label .opt{font-weight:400;color:var(--ink2);font-size:0.68rem;margin-left:4px;text-transform:none}
input[type=text],input[type=date],input[type=tel],select,textarea{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:7px;padding:10px 12px;font-family:'Noto Sans JP',sans-serif;font-size:0.92rem;color:var(--ink);transition:border-color 0.15s;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent2);background:#fff}
input.mono{font-family:'JetBrains Mono',monospace;font-size:1rem;letter-spacing:0.06em}
input.filled{border-color:var(--ok);background:#f0faf5}
input.manual-mode{border-color:var(--warn);background:#fffbf0}
.row2{display:flex;gap:10px}
.row2>*{flex:1}

.scan-wrap{display:flex;gap:8px;align-items:stretch}
.scan-wrap input{flex:1}
.btn-cam{background:var(--ink);color:#fff;border:none;border-radius:7px;padding:0 14px;font-size:1.2rem;cursor:pointer;flex-shrink:0;transition:background 0.15s}
.btn-cam:hover{background:#333}
.btn-cam.active{background:var(--accent)}

#scanner-container{display:none;position:relative;background:#000;border-radius:8px;overflow:hidden;margin-top:10px}
#scanner-container.visible{display:block}
#scanner-container video{width:100%;height:240px;display:block;object-fit:cover}
#scanner-container canvas{display:none !important}
.scan-overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;pointer-events:none}
.scan-box{width:72%;height:80px;border:2px solid rgba(255,255,255,0.9);border-radius:6px;position:relative;box-shadow:0 0 0 9999px rgba(0,0,0,0.45)}
.scan-line{position:absolute;left:4px;right:4px;height:2px;background:var(--accent);box-shadow:0 0 6px var(--accent);animation:sl 1.8s ease-in-out infinite}
@keyframes sl{0%,100%{top:8%}50%{top:82%}}

.product-found{background:var(--surface2);border:1.5px solid var(--ok);border-radius:8px;padding:10px 12px;margin-top:10px;display:none}
.product-found.visible{display:block}
.pf-name{font-weight:700;font-size:0.95rem;margin-bottom:4px;line-height:1.4}
.pf-meta{font-size:0.75rem;color:var(--ink2);font-family:'JetBrains Mono',monospace}
.pf-actions{display:flex;gap:8px;margin-top:10px}
.btn-use{flex:1;background:var(--ok);color:#fff;border:none;border-radius:7px;padding:9px;font-weight:700;font-size:0.85rem;cursor:pointer}
.btn-manual{flex:1;background:none;border:1.5px solid var(--warn);color:var(--warn);border-radius:7px;padding:9px;font-weight:700;font-size:0.85rem;cursor:pointer}
.manual-name-row{display:none;margin-top:10px}
.manual-name-row.visible{display:block}

.loc-wrap{display:flex;gap:8px}
.loc-wrap input{flex:1}
.loc-pending{background:var(--surface2);border:1.5px dashed var(--warn);border-radius:7px;padding:9px 12px;font-size:0.8rem;color:var(--warn);font-weight:700;cursor:pointer;flex-shrink:0;display:flex;align-items:center;gap:4px;white-space:nowrap}

.submit-area{padding:14px;border-top:1px solid var(--border);display:flex;gap:10px}
.btn-submit{flex:1;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:14px;font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:0.1em;cursor:pointer;transition:opacity 0.2s}
.btn-submit:hover{opacity:0.88}
.btn-reset{background:var(--surface2);border:1.5px solid var(--border);color:var(--ink2);border-radius:8px;padding:14px 16px;cursor:pointer;font-size:0.85rem}

#status{padding:8px 14px;font-size:0.78rem;min-height:32px;color:var(--ink2);display:flex;align-items:center;gap:6px}
#status.loading{color:var(--accent2)}
#status.ok{color:var(--ok);font-weight:700}
#status.err{color:var(--accent);font-weight:700}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid #ccc;border-top-color:var(--accent2);border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

.search-bar{display:flex;gap:8px;padding:12px 14px;border-bottom:1px solid var(--border)}
.search-bar input{flex:1;background:var(--surface2);border:1.5px solid var(--border);border-radius:7px;padding:9px 12px;font-size:0.88rem;color:var(--ink)}
.search-bar input:focus{outline:none;border-color:var(--accent2);background:#fff}
.btn-srch{background:var(--ink);color:#fff;border:none;border-radius:7px;padding:9px 14px;font-size:0.82rem;font-weight:700;cursor:pointer;white-space:nowrap}

.config-toggle{font-size:0.72rem;color:var(--ink2);cursor:pointer;text-align:right;padding:6px 14px;text-decoration:underline;text-decoration-style:dotted}
.config-panel{background:var(--surface2);border-top:1px solid var(--border);padding:12px 14px;display:none}
.config-panel.open{display:block}
.config-panel .form-row{margin-bottom:10px}

.history-head{padding:10px 14px 6px;font-family:'Bebas Neue',sans-serif;letter-spacing:0.1em;font-size:0.95rem;color:var(--ink2);display:flex;justify-content:space-between;align-items:center}
.btn-csv{background:none;border:1.5px solid var(--border);border-radius:6px;padding:4px 12px;font-size:0.72rem;color:var(--ink2);cursor:pointer;font-family:'Noto Sans JP',sans-serif}
.btn-csv:hover{border-color:var(--accent2);color:var(--accent2)}
#historyList{padding:0 14px 14px;display:flex;flex-direction:column;gap:8px}

.h-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;animation:fadeUp 0.25s ease}
.h-item.returned{border-color:var(--returned);background:#f8f4ff}
.h-item.alert-over{border-color:var(--accent);background:#fff5f5}
.h-item.alert-soon{border-color:var(--warn);background:#fffbf0}
.h-deadline{font-size:0.7rem;font-weight:700;padding:1px 8px;border-radius:4px;margin-left:4px;display:inline-block}
.h-deadline.over{background:var(--accent);color:#fff}
.h-deadline.soon{background:var(--warn);color:#fff}
.h-deadline.ok{background:var(--ok);color:#fff}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.h-row1{display:flex;align-items:flex-start;gap:8px;margin-bottom:3px}
.h-name{font-size:0.88rem;font-weight:700;flex:1;line-height:1.4}
.h-date{font-size:0.7rem;color:var(--ink2);white-space:nowrap;font-family:'JetBrains Mono',monospace;flex-shrink:0}
.h-meta{font-size:0.72rem;color:var(--ink2);font-family:'JetBrains Mono',monospace;line-height:1.7}
.h-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.h-btn{border:none;border-radius:5px;padding:5px 11px;font-size:0.72rem;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif}
.h-btn-edit{background:var(--surface2);border:1.5px solid var(--border);color:var(--ink2)}
.h-btn-loc{background:var(--warn);color:#fff}
.h-btn-return{background:var(--returned);color:#fff}
.h-btn-unreturn{background:var(--surface2);border:1.5px solid var(--returned);color:var(--returned)}
.h-loc{display:inline-block;background:var(--ink);color:#fff;padding:1px 7px;border-radius:4px;font-size:0.68rem;margin-right:4px;font-family:'JetBrains Mono',monospace}
.h-loc.pending{background:var(--warn)}
.h-badge-ret{display:inline-block;background:var(--returned);color:#fff;padding:1px 8px;border-radius:4px;font-size:0.68rem;font-weight:700;margin-right:4px}
.h-badge-unret{display:inline-block;background:var(--accent);color:#fff;padding:1px 8px;border-radius:4px;font-size:0.68rem;font-weight:700;margin-right:4px}

.empty-hist{text-align:center;color:var(--ink2);font-size:0.8rem;padding:20px;border:1.5px dashed var(--border);border-radius:8px}

#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--ink);color:#fff;padding:10px 24px;border-radius:24px;font-size:0.88rem;font-weight:700;transition:transform 0.3s ease;z-index:999;pointer-events:none;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0)}

.ocr-trigger{display:flex;align-items:center;gap:12px;padding:13px 14px;background:linear-gradient(135deg,#1a1714 0%,#2d2620 100%);border-radius:var(--radius);cursor:pointer;border:1.5px solid #3a3028;transition:opacity 0.15s;user-select:none}
.ocr-trigger:hover{opacity:0.88}
.ocr-icon{font-size:1.5rem;flex-shrink:0}
.ocr-label{color:#fff}
.ocr-label strong{display:block;font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:0.1em}
.ocr-label span{font-size:0.72rem;color:#aaa}
.badge-ocr{display:inline-block;background:var(--accent);color:#fff;font-size:0.62rem;font-weight:700;padding:1px 7px;border-radius:4px;margin-left:8px;vertical-align:middle}
.ocr-preview-wrap{display:none;margin-top:10px;position:relative}
.ocr-preview-wrap.visible{display:block}
#ocrPreview{width:100%;border-radius:8px;display:block;max-height:200px;object-fit:contain;background:#000}
.ocr-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.55);border-radius:8px;display:none;flex-direction:column;align-items:center;justify-content:center;gap:8px}
.ocr-overlay.visible{display:flex}
.ocr-spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite}
.ocr-overlay-text{color:#fff;font-size:0.8rem;font-weight:700}
.ocr-result-box{display:none;margin-top:10px;background:var(--surface2);border:1.5px solid var(--ok);border-radius:8px;padding:12px 14px}
.ocr-result-box.visible{display:block}
.ocr-result-title{font-family:'Bebas Neue',sans-serif;font-size:0.9rem;letter-spacing:0.08em;color:var(--ok);margin-bottom:10px}
.ocr-field{display:flex;flex-direction:column;gap:3px;margin-bottom:10px}
.ocr-field label{font-size:0.68rem;font-weight:700;letter-spacing:0.08em;color:var(--ink2);text-transform:uppercase}
.ocr-field input{background:#fff;border:1.5px solid var(--border);border-radius:6px;padding:8px 10px;font-size:0.9rem;color:var(--ink);font-family:'Noto Sans JP',sans-serif}
.ocr-apply-btn{width:100%;background:var(--ok);color:#fff;border:none;border-radius:7px;padding:10px;font-weight:700;font-size:0.9rem;cursor:pointer;font-family:'Noto Sans JP',sans-serif}
.ocr-err{display:none;margin-top:8px;font-size:0.78rem;color:var(--accent);font-weight:700}
.ocr-err.visible{display:block}
#ocrFileInput{display:none}

.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius);padding:20px;width:92%;max-width:420px;max-height:92vh;overflow-y:auto}
.modal h3{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:0.08em;margin-bottom:6px}
.modal-meta{font-size:0.78rem;color:var(--ink2);margin-bottom:14px;line-height:1.5;border-bottom:1px solid var(--border);padding-bottom:10px}
.modal-btns{display:flex;gap:10px;margin-top:14px}
.modal-btns button{flex:1;padding:11px;border-radius:7px;font-weight:700;cursor:pointer;font-size:0.88rem}
.btn-modal-ok{background:var(--ok);color:#fff;border:none}
.btn-modal-cancel{background:none;border:1.5px solid var(--border);color:var(--ink2)}

@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}60%{transform:translateX(6px)}80%{transform:translateX(-3px)}}
</style>
</head>
<body>

<header>
  <div>
    <div class="h-title">RETURN MANAGER</div>
    <div class="h-sub">入荷・返品管理システム</div>
  </div>
  <div class="h-badge">API + OCR対応</div>
</header>

<main>

<!-- STEP 1 -->
<div class="card">
  <div class="card-head"><span class="step">1</span>基本情報</div>
  <div class="card-body">
    <div class="ocr-trigger" onclick="triggerOcr()">
      <div class="ocr-icon">📸</div>
      <div class="ocr-label">
        <strong>送り状をOCRで読み取る<span class="badge-ocr">AI</span></strong>
        <span>写真を撮るだけで差出人・住所を自動入力</span>
      </div>
    </div>
    <input type="file" id="ocrFileInput" accept="image/*" capture="environment" onchange="handleOcrImage(event)">
    <div class="ocr-preview-wrap" id="ocrPreviewWrap">
      <img id="ocrPreview" src="" alt="">
      <div class="ocr-overlay" id="ocrOverlay">
        <div class="ocr-spinner"></div>
        <div class="ocr-overlay-text">AIが読み取り中...</div>
      </div>
    </div>
    <div class="ocr-result-box" id="ocrResultBox">
      <div class="ocr-result-title">読み取り結果 — 確認して適用</div>
      <div class="ocr-field"><label>送り状番号</label><input type="tel" class="mono" id="ocrTracking" placeholder="未検出"></div>
      <div class="ocr-field"><label>差出人名</label><input type="text" id="ocrSender" placeholder="未検出"></div>
      <div class="ocr-field"><label>差出人住所</label><input type="text" id="ocrAddress" placeholder="未検出"></div>
      <button class="ocr-apply-btn" onclick="applyOcrResult()">フォームに反映する</button>
    </div>
    <div class="ocr-err" id="ocrErr"></div>
    <div style="height:12px"></div>

    <div class="row2">
      <div class="form-row">
        <label>到着日<span class="req">*</span></label>
        <input type="date" id="arrivalDate">
      </div>
      <div class="form-row">
        <label>登録時刻</label>
        <input type="text" id="arrivalTime" readonly style="color:var(--ink2)">
      </div>
    </div>
    <div class="form-row">
      <label>送り状番号<span class="req">*</span></label>
      <input type="tel" class="mono" id="trackingNo" placeholder="例: 1234-5678-9012" maxlength="30">
    </div>
    <div class="form-row">
      <label>返送元（差出人）<span class="opt">任意</span></label>
      <input type="text" id="senderName" placeholder="例: 山田 太郎 / ○○株式会社">
    </div>
    <div class="form-row">
      <label>差出人住所<span class="opt">任意</span></label>
      <input type="text" id="senderAddress" placeholder="例: 東京都渋谷区〇〇1-2-3">
    </div>
  </div>
</div>

<!-- STEP 2 -->
<div class="card">
  <div class="card-head"><span class="step">2</span>商品情報</div>
  <div class="card-body">
    <div class="form-row">
      <label>JANコード<span class="opt">スキャンまたは手入力</span></label>
      <div class="scan-wrap">
        <input type="tel" class="mono" id="janInput" placeholder="4901234567890" maxlength="14"
               oninput="onJanInput()" onkeydown="if(event.key==='Enter'){event.preventDefault();searchProduct()}">
        <button class="btn-cam" id="camBtn" onclick="toggleCamera()">📷</button>
      </div>
      <div id="scanner-container">
        <div id="interactive"></div>
        <div class="scan-overlay">
          <div class="scan-box"><div class="scan-line"></div></div>
        </div>
      </div>
    </div>
    <div id="status"></div>
    <div class="product-found" id="productFound">
      <div class="pf-name" id="pfName"></div>
      <div class="pf-meta" id="pfMeta"></div>
      <div class="pf-actions">
        <button class="btn-use" onclick="useProduct()">この商品を使用</button>
        <button class="btn-manual" onclick="goManual()">手打ちで入力</button>
      </div>
    </div>
    <div class="manual-name-row" id="manualNameRow">
      <div class="form-row" style="margin:0">
        <label>商品名<span class="req">*</span>（手動入力）</label>
        <input type="text" id="productNameManual" placeholder="商品名を入力してください" class="manual-mode">
      </div>
    </div>
    <input type="hidden" id="productNameFixed">
    <input type="hidden" id="productCode">

    <div class="form-row" style="margin-top:12px">
      <label>品名<span class="opt">任意 — 状態・種別など</span></label>
      <input type="text" id="itemDescription" placeholder="例: 返品 / 不良品 / 未開封">
    </div>
    <div class="form-row">
      <label>数量<span class="req">*</span></label>
      <div style="display:flex;gap:8px;align-items:center">
        <button onclick="changeQty(-1)" style="width:38px;height:38px;border:1.5px solid var(--border);border-radius:7px;font-size:1.1rem;cursor:pointer;background:var(--surface2)">−</button>
        <input type="tel" id="qtyInput" value="1" style="width:70px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:1.1rem;font-weight:700">
        <button onclick="changeQty(1)" style="width:38px;height:38px;border:1.5px solid var(--border);border-radius:7px;font-size:1.1rem;cursor:pointer;background:var(--surface2)">＋</button>
      </div>
    </div>
  </div>
</div>

<!-- STEP 3 -->
<div class="card">
  <div class="card-head"><span class="step">3</span>ロケーション</div>
  <div class="card-body">
    <div class="form-row">
      <label>ロケーション番号<span class="opt">後で追加可</span></label>
      <div class="loc-wrap">
        <input type="text" class="mono" id="locationInput" placeholder="例: A-01-03">
        <div class="loc-pending" onclick="setPending()">⏳ 後で</div>
      </div>
    </div>
    <div id="locPendingNote" style="display:none;font-size:0.75rem;color:var(--warn);margin-top:4px;font-weight:700">
      ⚠ ロケーション未定
    </div>
  </div>
</div>

<!-- 登録 -->
<div class="card">
  <div class="submit-area">
    <button class="btn-submit" onclick="submitEntry()">入 荷 登 録</button>
    <button class="btn-reset" onclick="resetForm()">リセット</button>
  </div>
  <div class="config-toggle" onclick="toggleConfig()">⚙ API設定</div>
  <div class="config-panel" id="configPanel">
    <div class="form-row">
      <label>Yahoo! Client ID</label>
      <input type="password" id="yahooId" placeholder="Yahoo! Client ID">
    </div>
    <div class="form-row">
      <label>GASウェブアプリURL</label>
      <input type="text" id="gasUrl" placeholder="https://script.google.com/macros/s/...">
    </div>
    <div class="form-row">
      <label>返送期限（到着日から何日）</label>
      <div style="display:flex;gap:8px;align-items:center">
        <input type="tel" id="deadlineDays" placeholder="例: 14" style="width:100px">
        <span style="font-size:0.82rem;color:var(--ink2)">日以内 / 0で無効</span>
      </div>
    </div>
    <button class="btn-use" style="width:100%;margin-top:4px" onclick="saveConfig()">保存</button>
  </div>
</div>

<!-- 履歴 -->
<div class="card">
  <div class="history-head">
    <span>登録履歴</span>
    <div style="display:flex;gap:6px">
      <button class="btn-csv" onclick="openSyncModal()" id="syncBtn">↓ シート読込</button>
      <button class="btn-csv" onclick="exportCSV()">CSV出力</button>
    </div>
  </div>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="送り状番号 / JAN / 商品名で検索..."
           oninput="renderHistory()" onkeydown="if(event.key==='Enter')renderHistory()">
    <button class="btn-srch" onclick="renderHistory()">検索</button>
  </div>
  <div id="syncStatus" style="display:none;padding:8px 14px;font-size:0.78rem;color:var(--accent2);display:flex;align-items:center;gap:6px"></div>
  <div id="historyList"></div>
</div>

</main>

<!-- ロケーションモーダル -->
<div class="modal-bg" id="locModal">
  <div class="modal">

    <div class="modal-meta" id="locModalMeta"></div>

<!-- シート読込フィルターモーダル -->
<div class="modal-bg" id="syncModal">
  <div class="modal">
    <h3>シートから読み込む</h3>
    <div class="modal-meta">スプレッドシートのデータでアプリを更新します</div>

      <label>読み込む対象</label>
      <select id="syncFilter">
        <option value="all">全件</option>
        <option value="unreturned">未返送のみ</option>

      </select>

      <button class="btn-modal-ok" onclick="syncFromGas()">読み込む</button>
      <button class="btn-modal-cancel" onclick="closeModal('syncModal')">キャンセル</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const GAS_DEFAULT = 'https://script.google.com/macros/s/AKfycbwdCC596WlUhEt-KZ8kzj2ekOb__T9QtfCGIXdDsrhjEfFkpt_iKjvVTMrM2nTBpF_K/exec';

let CFG = {
  yahooId:      localStorage.getItem('wh_yahoo_id')       || '',
  gasUrl:       localStorage.getItem('wh_gas_url')        || '',
  deadlineDays: parseInt(localStorage.getItem('wh_deadline_days') || '0')
};
let history = JSON.parse(localStorage.getItem('wh_history') || '[]');
let scanning = false, lastCode = null, currentProduct = null, locPending = false;
let editIdx = null, locIdx = null, retIdx = null;

// INIT
window.onload = () => {
  document.getElementById('arrivalDate').value = new Date().toISOString().slice(0,10);
  updateTime(); setInterval(updateTime, 30000);
  if (CFG.yahooId)      document.getElementById('yahooId').value      = CFG.yahooId;
  if (CFG.gasUrl)       document.getElementById('gasUrl').value       = CFG.gasUrl;
  if (CFG.deadlineDays) document.getElementById('deadlineDays').value = CFG.deadlineDays;
  if (!CFG.gasUrl) document.getElementById('configPanel').classList.add('open');
  renderHistory();
};
function updateTime() {
  const n = new Date();
  document.getElementById('arrivalTime').value =
    n.getHours().toString().padStart(2,'0') + ':' + n.getMinutes().toString().padStart(2,'0');
}

// CONFIG
function toggleConfig() { document.getElementById('configPanel').classList.toggle('open'); }
function saveConfig() {
  CFG.yahooId      = document.getElementById('yahooId').value.trim();
  CFG.gasUrl       = document.getElementById('gasUrl').value.trim();
  CFG.deadlineDays = parseInt(document.getElementById('deadlineDays').value) || 0;
  localStorage.setItem('wh_yahoo_id',       CFG.yahooId);
  localStorage.setItem('wh_gas_url',        CFG.gasUrl);
  localStorage.setItem('wh_deadline_days',  CFG.deadlineDays);
  document.getElementById('configPanel').classList.remove('open');
  showToast('設定を保存しました');
  renderHistory();
}

// CAMERA
function toggleCamera() { scanning ? stopCamera() : startCamera(); }
function startCamera() {
  document.getElementById('scanner-container').classList.add('visible');
  const btn = document.getElementById('camBtn');
  btn.classList.add('active'); btn.textContent = '⏹';

  Quagga.init({
    inputStream: {
      name: 'Live', type: 'LiveStream',
      target: document.getElementById('interactive'),
      constraints: { facingMode: 'environment', width:{ideal:1280}, height:{ideal:720} }
    },
    decoder: { readers: ['ean_reader','ean_8_reader','code_128_reader'] },
    locate: true, numOfWorkers: 2, frequency: 10
  }, err => {
    if (err) { setStatus('カメラ起動失敗', 'err'); return; }
    // Quaggaのcanvasを非表示（videoのみ表示してオーバーレイと一致させる）
    document.querySelectorAll('#interactive canvas').forEach(c => c.style.cssText = 'display:none!important');
    Quagga.start(); scanning = true;
  });

  Quagga.onDetected(data => {
    const code = data.codeResult.code;
    if (code === lastCode) return;
    lastCode = code;
    document.getElementById('janInput').value = code;
    stopCamera(); searchProduct();
  });
}
function stopCamera() {
  if (scanning) { Quagga.stop(); scanning = false; }
  document.getElementById('scanner-container').classList.remove('visible');
  const btn = document.getElementById('camBtn');
  btn.classList.remove('active'); btn.textContent = '📷';
  lastCode = null;
}

// PRODUCT SEARCH
function onJanInput() {
  const v = document.getElementById('janInput').value.trim();
  if (v.length === 13 && /^\d+$/.test(v)) searchProduct();
}
async function searchProduct() {
  const code = document.getElementById('janInput').value.trim();
  if (!code || code.length < 8) return;
  resetProductArea();
  setStatus('Yahoo!ショッピングから検索中...', 'loading');
  try {
    const url = `${CFG.gasUrl || GAS_DEFAULT}?mode=yahoo&jan=${code}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (!data.hits || !data.hits.length) {
      setStatus('商品が見つかりませんでした', 'err'); showManualInput(); return;
    }
    const item = data.hits[0];
    currentProduct = { code, name: item.name, brand: item.brand?.name || item.seller?.name || '', price: item.price || null };
    document.getElementById('pfName').textContent = item.name;
    document.getElementById('pfMeta').textContent =
      `JAN: ${code}${currentProduct.brand ? '  / ' + currentProduct.brand : ''}${currentProduct.price ? '  ¥' + currentProduct.price.toLocaleString() : ''}`;
    document.getElementById('productFound').classList.add('visible');
    setStatus('商品情報を取得しました ✓', 'ok');
  } catch(e) { setStatus('取得エラー: ' + e.message, 'err'); showManualInput(); }
}
function useProduct() {
  document.getElementById('productNameFixed').value = currentProduct.name;
  document.getElementById('productCode').value = currentProduct.code;
  document.getElementById('janInput').classList.add('filled');
  document.getElementById('productFound').classList.remove('visible');
  document.getElementById('manualNameRow').classList.remove('visible');
  setStatus('✓ ' + currentProduct.name, 'ok');
}
function goManual() { document.getElementById('productFound').classList.remove('visible'); showManualInput(); }
function showManualInput() { document.getElementById('manualNameRow').classList.add('visible'); document.getElementById('productNameManual').focus(); }
function resetProductArea() {
  currentProduct = null;
  document.getElementById('productFound').classList.remove('visible');
  document.getElementById('manualNameRow').classList.remove('visible');
  document.getElementById('productNameFixed').value = '';
  document.getElementById('productCode').value = '';
  document.getElementById('janInput').classList.remove('filled');
}

// QTY
function changeQty(d) {
  const el = document.getElementById('qtyInput');
  el.value = Math.max(1, (parseInt(el.value)||1) + d);
}

// LOCATION
function setPending() {
  locPending = true;
  const el = document.getElementById('locationInput');
  el.value = ''; el.placeholder = '後で追加'; el.style.borderColor = 'var(--warn)';
  document.getElementById('locPendingNote').style.display = 'block';
}

// SUBMIT
function submitEntry() {
  const date    = document.getElementById('arrivalDate').value;
  const time    = document.getElementById('arrivalTime').value;
  const tracking= document.getElementById('trackingNo').value.trim();
  const sender  = document.getElementById('senderName').value.trim();
  const sAddr   = document.getElementById('senderAddress').value.trim();
  const jan     = document.getElementById('janInput').value.trim();
  const pName   = document.getElementById('productNameFixed').value || document.getElementById('productNameManual').value.trim();
  const desc    = document.getElementById('itemDescription').value.trim();
  const qty     = parseInt(document.getElementById('qtyInput').value)||1;
  const loc     = document.getElementById('locationInput').value.trim();

  if (!date)    { shake('arrivalDate'); showToast('到着日を入力してください'); return; }
  if (!tracking){ shake('trackingNo'); showToast('送り状番号を入力してください'); return; }
  if (!pName)   { showToast('商品名を入力または選択してください'); return; }

  const entry = {
    id: Date.now(), date, time, tracking,
    sender, senderAddress: sAddr, jan, productName: pName,
    itemDescription: desc, qty, location: loc || null, locPending: !loc,
    returned: false, returnedDate: null, returnNote: null,
    registeredAt: new Date().toLocaleString('ja-JP')
  };
  history.unshift(entry); save(); renderHistory();
  showToast('入荷登録しました ✓');
  sendToGas(entry);
  resetForm();
}

function sendToGas(entry) {
  _postToGas({ ...entry });
}

// GAS同期（更新）
function syncToGas(entry) {
  _postToGas({ ...entry, mode: 'update' });
}

function _postToGas(payload) {
  const url = CFG.gasUrl || GAS_DEFAULT;
  fetch(url, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'text/plain;charset=UTF-8' },
    body: JSON.stringify(payload)
  }).catch(e => console.error('GAS送信エラー:', e));
}

// RESET
function resetForm() {
  ['trackingNo','senderName','senderAddress','itemDescription'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('janInput').value = '';
  document.getElementById('qtyInput').value = '1';
  const loc = document.getElementById('locationInput');
  loc.value = ''; loc.placeholder = '例: A-01-03'; loc.style.borderColor = '';
  document.getElementById('locPendingNote').style.display = 'none';
  locPending = false; resetProductArea(); resetOcr(); setStatus(''); updateTime();
}

// HISTORY
function save() { localStorage.setItem('wh_history', JSON.stringify(history)); }

function renderHistory() {
  const el = document.getElementById('historyList');
  const q  = (document.getElementById('searchInput').value || '').trim().toLowerCase();
  let list = q ? history.filter(i =>
    (i.tracking||'').toLowerCase().includes(q) ||
    (i.jan||'').includes(q) ||
    (i.productName||'').toLowerCase().includes(q) ||
    (i.itemDescription||'').toLowerCase().includes(q) ||
    (i.sender||'').toLowerCase().includes(q)
  ) : history;

  if (!list.length) {
    el.innerHTML = `<div class="empty-hist">${q ? '検索結果なし' : '登録データがありません'}</div>`; return;
  }

  const today = new Date(); today.setHours(0,0,0,0);

  el.innerHTML = list.map(item => {
    const idx = history.indexOf(item);
    const locB = item.locPending ? `<span class="h-loc pending">未定</span>` : item.location ? `<span class="h-loc">${esc(item.location)}</span>` : '';
    const retB = item.returned ? `<span class="h-badge-ret">返送済</span>` : `<span class="h-badge-unret">未返送</span>`;
    const descTxt = item.itemDescription ? ` <span style="font-weight:400;color:var(--ink2)">（${esc(item.itemDescription)}）</span>` : '';

    // 期限アラート計算
    let alertClass = '', deadlineBadge = '';
    if (CFG.deadlineDays > 0 && !item.returned && item.date) {
      const arrival = new Date(item.date); arrival.setHours(0,0,0,0);
      const deadline = new Date(arrival); deadline.setDate(deadline.getDate() + CFG.deadlineDays);
      const diffDays = Math.ceil((deadline - today) / 86400000);
      if (diffDays < 0) {
        alertClass = 'alert-over';
        deadlineBadge = `<span class="h-deadline over">期限超過 ${Math.abs(diffDays)}日</span>`;
      } else if (diffDays <= 3) {
        alertClass = 'alert-soon';
        deadlineBadge = `<span class="h-deadline soon">期限まで${diffDays}日</span>`;
      } else {
        deadlineBadge = `<span class="h-deadline ok">${diffDays}日後</span>`;
      }
    }

    return `<div class="h-item${item.returned?' returned':''} ${alertClass}">
      <div class="h-row1">
        <div class="h-name">${retB}${esc(item.productName)}${descTxt}${deadlineBadge}</div>
        <div class="h-date">${item.date}</div>
      </div>
      <div class="h-meta">
        ${locB}送状: ${esc(item.tracking)}${item.sender ? ' / '+esc(item.sender) : ''}${item.jan ? ' / JAN:'+item.jan : ''} ×${item.qty}${item.returned&&item.returnedDate ? ' / 返送:'+item.returnedDate : ''}
      </div>
      <div class="h-actions">
        <button class="h-btn h-btn-edit" onclick="openEditModal(${idx})">✏ 編集</button>
        ${item.locPending ? `<button class="h-btn h-btn-loc" onclick="openLocModal(${idx})">📍 ロケ追加</button>` : ''}
        ${item.returned
          ? `<button class="h-btn h-btn-unreturn" onclick="toggleReturn(${idx})">↩ 返送取消</button>`
          : `<button class="h-btn h-btn-return" onclick="openReturnModal(${idx})">📦 未返送</button>`}
      </div>
    </div>`;
  }).join('');
}

// EDIT
function openEditModal(idx) {
  editIdx = idx; const i = history[idx];
  document.getElementById('editModalMeta').textContent = `登録: ${i.registeredAt}`;
  document.getElementById('em-date').value     = i.date || '';
  document.getElementById('em-tracking').value = i.tracking || '';
  document.getElementById('em-sender').value   = i.sender || '';
  document.getElementById('em-address').value  = i.senderAddress || '';
  document.getElementById('em-jan').value      = i.jan || '';
  document.getElementById('em-name').value     = i.productName || '';
  document.getElementById('em-desc').value     = i.itemDescription || '';
  document.getElementById('em-qty').value      = i.qty || 1;
  document.getElementById('em-loc').value      = i.location || '';
  document.getElementById('editModal').classList.add('open');
}
function saveEdit() {
  const i = history[editIdx];
  i.date = document.getElementById('em-date').value;
  i.tracking = document.getElementById('em-tracking').value.trim();
  i.sender = document.getElementById('em-sender').value.trim();
  i.senderAddress = document.getElementById('em-address').value.trim();
  i.jan = document.getElementById('em-jan').value.trim();
  i.productName = document.getElementById('em-name').value.trim();
  i.itemDescription = document.getElementById('em-desc').value.trim();
  i.qty = parseInt(document.getElementById('em-qty').value)||1;
  const loc = document.getElementById('em-loc').value.trim();
  i.location = loc || null; i.locPending = !loc;
  save(); renderHistory(); closeModal('editModal');
  syncToGas(i); showToast('編集を保存しました');
}

// LOC
function openLocModal(idx) {
  locIdx = idx; const i = history[idx];
  document.getElementById('locModalMeta').textContent = `${i.productName} / 送状: ${i.tracking}`;
  document.getElementById('locModalInput').value = '';
  document.getElementById('locModal').classList.add('open');
  setTimeout(() => document.getElementById('locModalInput').focus(), 100);
}
function saveLocation() {
  const loc = document.getElementById('locModalInput').value.trim();
  if (!loc) { showToast('ロケーション番号を入力してください'); return; }
  history[locIdx].location = loc; history[locIdx].locPending = false;
  save(); renderHistory(); closeModal('locModal');
  syncToGas(history[locIdx]); showToast('ロケーションを登録しました');
}

// RETURN
function openReturnModal(idx) {
  retIdx = idx; const i = history[idx];
  document.getElementById('returnModalMeta').textContent = `${i.productName}\n送状: ${i.tracking}`;
  document.getElementById('rm-date').value = new Date().toISOString().slice(0,10);
  document.getElementById('rm-note').value = '';
  document.getElementById('returnModal').classList.add('open');
}
function saveReturn() {
  history[retIdx].returned = true;
  history[retIdx].returnedDate = document.getElementById('rm-date').value;
  history[retIdx].returnNote = document.getElementById('rm-note').value.trim();
  save(); renderHistory(); closeModal('returnModal');
  syncToGas(history[retIdx]); showToast('返送済みにしました');
}
function toggleReturn(idx) {
  history[idx].returned = false; history[idx].returnedDate = null; history[idx].returnNote = null;
  save(); renderHistory();
  syncToGas(history[idx]); showToast('返送フラグを解除しました');
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// GAS同期（更新）
function syncToGas(entry) {
  const url = CFG.gasUrl || GAS_DEFAULT;
  fetch(url, {
    method: 'POST', headers: {'Content-Type':'text/plain'},
    body: JSON.stringify({ ...entry, mode: 'update' })
  }).catch(console.error);
}

// ════════════════════════════════════
//  シート逆引き（GAS → アプリ）
// ════════════════════════════════════
function openSyncModal() { document.getElementById('syncModal').classList.add('open'); }

async function syncFromGas() {
  const filter = document.getElementById('syncFilter').value;
  closeModal('syncModal');

  const btn = document.getElementById('syncBtn');
  const statusEl = document.getElementById('syncStatus');
  const gasUrl = CFG.gasUrl || GAS_DEFAULT;

  btn.textContent = '読込中...';
  btn.disabled = true;
  statusEl.style.display = 'flex';
  statusEl.style.color = 'var(--accent2)';
  statusEl.innerHTML = '<span class="spinner"></span>スプレッドシートから読み込み中...';

  try {
    const res = await fetch(`${gasUrl}?mode=getAll`);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();

    if (data.error) throw new Error(data.error);
    if (!data.rows || !data.rows.length) {
      statusEl.innerHTML = 'データがありません'; return;
    }

    // 行をアプリ形式に変換
    let imported = data.rows.map(r => ({
      id:              Date.now() + Math.random(),
      registeredAt:    r['登録日時']        || '',
      date:            r['到着日']          || '',
      time:            r['時刻']            || '',
      tracking:        r['送り状番号']      || '',
      sender:          r['返送元']          || '',
      senderAddress:   r['差出人住所']      || '',
      jan:             r['JANコード']       || '',
      productName:     r['商品名']          || '',
      itemDescription: r['品名']            || '',
      qty:             parseInt(r['数量'])  || 1,
      location:        r['ロケーション']    || null,
      locPending:      r['ロケーション状態'] === '未定',
      returned:        r['返送済み']        === '返送済',
      returnedDate:    r['返送日']          || null,
      returnNote:      r['返送備考']        || null
    }));

    // フィルター適用
    if (filter === 'unreturned') imported = imported.filter(i => !i.returned);
    if (filter === 'returned')   imported = imported.filter(i => i.returned);

    // 到着日の降順でソート・キャッシュを完全置き換え
    imported.sort((a, b) => (a.date > b.date ? -1 : a.date < b.date ? 1 : 0));
    history = imported;
    save();
    renderHistory();

    const filterLabel = filter === 'unreturned' ? '未返送' : filter === 'returned' ? '返送済み' : '全件';
    statusEl.innerHTML = `✓ ${filterLabel} ${imported.length}件を読み込みました`;
    statusEl.style.color = 'var(--ok)';
    setTimeout(() => { statusEl.style.display = 'none'; }, 3000);

  } catch(e) {
    statusEl.innerHTML = '読み込みエラー: ' + e.message;
    statusEl.style.color = 'var(--accent)';
  } finally {
    btn.textContent = '↓ シート読込';
    btn.disabled = false;
  }
}

// CSV
function exportCSV() {
  if (!history.length) { showToast('登録データがありません'); return; }
  const header = ['登録日時','到着日','時刻','送り状番号','返送元','差出人住所','JANコード','商品名','品名','数量','ロケーション','ロケーション状態','返送済み','返送日','返送備考'];
  const rows = history.map(i => [
    i.registeredAt, i.date, i.time, i.tracking,
    i.sender||'', i.senderAddress||'', i.jan||'', i.productName, i.itemDescription||'', i.qty,
    i.location||'', i.locPending?'未定':'確定',
    i.returned?'返送済':'未返送', i.returnedDate||'', i.returnNote||''
  ]);
  const csv = [header,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
  a.download = `返品管理_${new Date().toLocaleDateString('ja-JP').replace(/\//g,'-')}.csv`;
  a.click();
}

// OCR
function triggerOcr() { document.getElementById('ocrFileInput').click(); }

async function handleOcrImage(e) {
  const file = e.target.files[0]; if (!file) return;
  const resized = await resizeImage(file, 1600);
  const base64Data = resized.split(',')[1];
  document.getElementById('ocrPreview').src = resized;
  document.getElementById('ocrPreviewWrap').classList.add('visible');
  document.getElementById('ocrResultBox').classList.remove('visible');
  document.getElementById('ocrErr').classList.remove('visible');
  document.getElementById('ocrOverlay').classList.add('visible');
  try {
    const result = await callClaudeOcr(base64Data);
    document.getElementById('ocrOverlay').classList.remove('visible');
    showOcrResult(result);
  } catch(err) {
    document.getElementById('ocrOverlay').classList.remove('visible');
    const el = document.getElementById('ocrErr');
    el.textContent = '読み取りエラー: ' + err.message; el.classList.add('visible');
  }
  e.target.value = '';
}

function resizeImage(file, maxWidth) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxWidth / img.width);
        const w = Math.round(img.width * scale), h = Math.round(img.height * scale);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.85));
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function callClaudeOcr(base64Data) {
  const gasUrl = CFG.gasUrl || GAS_DEFAULT;
  const prompt = `この画像は日本の宅配便の送り状（返品伝票）です。
以下の情報を読み取り、必ずJSON形式のみで返してください。説明文や記号を前後に含めないでください。

{"tracking_number":"送り状番号","sender_name":"差出人名","sender_address":"差出人住所"}

【読み取りの指針】
- 送り状番号: 「お問い合わせ番号」「送り状番号」「伝票番号」などのラベルに対応する番号。バーコードの直下や右上付近にあることが多い。ハイフン区切りの場合はそのまま返す。
- 差出人: 「ご依頼主」「差出人」「FROM」「Shipper」などのラベルに対応する氏名または会社名。お届け先（TO側）の名前は取得しない。
- 差出人住所: 差出人欄に記載された都道府県から始まる住所。お届け先の住所は取得しない。
- 読み取れない・判断できない項目はnullにする。`;

  const res = await fetch(gasUrl, {
    method: 'POST', headers: {'Content-Type':'text/plain'},
    body: JSON.stringify({ mode: 'ocr', image: base64Data, mimeType: 'image/jpeg', prompt })
  });
  if (!res.ok) throw new Error('GAS error: ' + res.status);
  const d = await res.json();
  if (d.error) throw new Error(d.error);
  if (!d.text) throw new Error('レスポンスが空です');
  return JSON.parse(d.text.replace(/```json|```/g,'').trim());
}

function showOcrResult(r) {
  document.getElementById('ocrTracking').value = r.tracking_number || '';
  document.getElementById('ocrSender').value   = r.sender_name    || '';
  document.getElementById('ocrAddress').value  = r.sender_address || '';
  document.getElementById('ocrResultBox').classList.add('visible');
}
function applyOcrResult() {
  const t = document.getElementById('ocrTracking').value.trim();
  const s = document.getElementById('ocrSender').value.trim();
  const a = document.getElementById('ocrAddress').value.trim();
  if (t) document.getElementById('trackingNo').value    = t;
  if (s) document.getElementById('senderName').value    = s;
  if (a) document.getElementById('senderAddress').value = a;
  document.getElementById('ocrResultBox').classList.remove('visible');
  document.getElementById('ocrPreviewWrap').classList.remove('visible');
  showToast('フォームに反映しました ✓');
}
function resetOcr() {
  ['ocrPreviewWrap','ocrResultBox','ocrErr','ocrOverlay'].forEach(id =>
    document.getElementById(id).classList.remove('visible'));
  document.getElementById('ocrPreview').src = '';
}

// UTILS
function setStatus(msg, type='') {
  const el = document.getElementById('status'); el.className = type;
  el.innerHTML = type==='loading' ? `<span class="spinner"></span>${msg}` : msg;
}
function showToast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg;
  t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2200);
}
function shake(id) {
  const el = document.getElementById(id); el.style.animation = 'none'; el.offsetHeight;
  el.style.animation = 'shake 0.4s ease';
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
